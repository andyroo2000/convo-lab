name: Run Script on Production

on:
  workflow_dispatch:
    inputs:
      script_command:
        description: 'Command to run (e.g., "npx tsx scripts/your-script.ts arg1 arg2")'
        required: true
        type: string
      timeout:
        description: 'Timeout in seconds (default: 300)'
        required: false
        default: '300'
        type: string
      service:
        description: 'Container service to run the command in'
        required: false
        default: 'server'
        type: choice
        options:
          - server
          - learning-os

jobs:
  run-script:
    name: Execute Script on Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Execute script on production
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} << 'ENDSSH'
            set -e

            echo "🚀 Running script on production..."
            echo "Command: ${{ inputs.script_command }}"
            echo "Timeout: ${{ inputs.timeout }} seconds"
            echo "Service: ${{ inputs.service }}"

            cd /opt/convolab

            service="${{ inputs.service }}"
            if [ "$service" = "server" ]; then
              active_color=$(cat /opt/convolab-runtime/prod-active-color)
              service="server-$active_color"
            fi

            timeout ${{ inputs.timeout }} docker compose -p convolab-prod -f docker-compose.prod.yml --env-file .env.production exec -T "$service" sh -c "${{ inputs.script_command }}" < /dev/null || {
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 124 ]; then
                echo "❌ Script timed out after ${{ inputs.timeout }} seconds"
                exit 124
              else
                echo "❌ Script failed with exit code $EXIT_CODE"
                exit $EXIT_CODE
              fi
            }

            if [ "${{ inputs.service }}" = "learning-os" ]; then
              docker logs --since 10m --tail 300 learning-os-api 2>&1
            fi

            echo "✅ Script completed successfully"
          ENDSSH

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Script execution failed"
          echo "Command: ${{ inputs.script_command }}"
