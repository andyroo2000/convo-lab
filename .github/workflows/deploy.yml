name: Build and Deploy ConvoLab (Staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: server
            dockerfile: Dockerfile
            context: .
          - name: worker
            dockerfile: server/Dockerfile.worker
            context: .
          - name: furigana
            dockerfile: furigana-service/Dockerfile
            context: ./furigana-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/convolab-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_GA_MEASUREMENT_ID=${{ vars.VITE_GA_MEASUREMENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to DigitalOcean (Staging)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is not set"
            exit 1
          fi
          curl -fsS https://api.openai.com/v1/models \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -o /dev/null

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to droplet
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} << 'ENDSSH'
            set -e

            echo "🚀 Starting ConvoLab deployment..."
            IMAGE_TAG="${{ github.ref_name }}-${{ github.sha }}"

            # Navigate to deployment directory
            cd /opt/convolab

            # Configure git with token for private repo access
            git config credential.helper store
            echo "https://${{ secrets.GH_PAT }}@github.com" > ~/.git-credentials
            chmod 600 ~/.git-credentials

            # Pull latest code
            echo "📦 Pulling latest code from GitHub..."
            git fetch origin
            git reset --hard origin/main

            # Inject secrets not stored in repo (staging)
            if grep -q '^FISH_AUDIO_API_KEY=' .env.staging; then
              sed -i "s#^FISH_AUDIO_API_KEY=.*#FISH_AUDIO_API_KEY=${{ secrets.FISH_AUDIO_API_KEY }}#g" .env.staging
            else
              echo "FISH_AUDIO_API_KEY=${{ secrets.FISH_AUDIO_API_KEY }}" >> .env.staging
            fi

            if grep -q '^CLIENT_URL=' .env.staging; then
              sed -i "s#^CLIENT_URL=.*#CLIENT_URL=https://stage.convo-lab.com#g" .env.staging
            else
              echo "CLIENT_URL=https://stage.convo-lab.com" >> .env.staging
            fi

            if grep -q '^OPENAI_API_KEY=' .env.staging; then
              sed -i "s#^OPENAI_API_KEY=.*#OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}#g" .env.staging
            else
              echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env.staging
            fi

            if grep -q '^LLM_PROVIDER=' .env.staging; then
              sed -i "s#^LLM_PROVIDER=.*#LLM_PROVIDER=openai#g" .env.staging
            else
              echo "LLM_PROVIDER=openai" >> .env.staging
            fi

            if grep -q '^STUDY_CARD_GENERATOR_MODEL=' .env.staging; then
              sed -i "s#^STUDY_CARD_GENERATOR_MODEL=.*#STUDY_CARD_GENERATOR_MODEL=gpt-5.5#g" .env.staging
            else
              echo "STUDY_CARD_GENERATOR_MODEL=gpt-5.5" >> .env.staging
            fi

            if ! grep -Eq '^OPENAI_API_KEY=.+$' .env.staging; then
              echo "❌ OPENAI_API_KEY is missing after staging env injection."
              exit 1
            fi

            # Login to GitHub Container Registry
            echo "🔐 Logging in to GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Free up disk space before pulling new images
            echo "🧹 Pruning unused Docker data to free space..."
            docker system prune -af

            # Persist image tag in env file so containers can restart independently
            if grep -q '^CONVOLAB_IMAGE_TAG=' .env.staging; then
              sed -i "s#^CONVOLAB_IMAGE_TAG=.*#CONVOLAB_IMAGE_TAG=$IMAGE_TAG#g" .env.staging
            else
              echo "CONVOLAB_IMAGE_TAG=$IMAGE_TAG" >> .env.staging
            fi
            # Ensure compose interpolation uses this run's image tag (shell env takes precedence)
            export CONVOLAB_IMAGE_TAG="$IMAGE_TAG"

            # Pull latest images
            echo "🐋 Pulling latest Docker images..."
            docker compose -p convolab-stage -f docker-compose.stage.yml --env-file .env.staging pull

            # Stop containers first to avoid metadata issues
            echo "🛑 Stopping existing containers..."
            # Force-stop any lingering staging containers that might block network removal.
            # Use explicit names instead of grepping docker IDs so we only touch stage services.
            docker stop \
              convolab-server-stage \
              convolab-worker-stage \
              convolab-postgres-stage \
              convolab-redis-stage \
              2>/dev/null || true
            docker compose -p convolab-stage -f docker-compose.stage.yml --env-file .env.staging down --remove-orphans 2>/dev/null || true
            # Remove stale stopped containers to avoid name conflicts on recreate
            docker rm -f \
              convolab-server-stage \
              convolab-worker-stage \
              convolab-postgres-stage \
              convolab-redis-stage \
              2>/dev/null || true

            # Recover known failed study migrations from prior stage deploy attempts.
            # This is safe to run repeatedly: if a failed record is absent, migrate resolve exits non-zero
            # and we intentionally continue.
            echo "🩹 Recovering known failed study migration state if present..."
            docker compose -p convolab-stage -f docker-compose.stage.yml --env-file .env.staging up -d postgres-stage redis-stage

            echo "⏳ Waiting for staging postgres and redis to become healthy..."
            for i in {1..30}; do
              postgres_status=$(docker inspect -f '{{.State.Health.Status}}' convolab-postgres-stage 2>/dev/null || echo "missing")
              redis_status=$(docker inspect -f '{{.State.Health.Status}}' convolab-redis-stage 2>/dev/null || echo "missing")
              echo "Postgres health: $postgres_status | Redis health: $redis_status"
              if [ "$postgres_status" = "healthy" ] && [ "$redis_status" = "healthy" ]; then
                break
              fi
              sleep 2
            done

            # Close stdin explicitly so this one-off container cannot consume the
            # remainder of the SSH heredoc before we restart the full stage stack.
            for failed_migration in \
              20260422113000_harden_study_card_state \
              20260422193000_fix_study_search_text_backfill \
              20260422213000_add_study_card_type_check; do
              docker compose -p convolab-stage -f docker-compose.stage.yml --env-file .env.staging run --rm -T server-stage \
                npx prisma migrate resolve --rolled-back "$failed_migration" --schema prisma/schema.prisma \
                </dev/null || true
            done

            # Start containers with environment file
            echo "♻️  Starting containers..."
            docker compose -p convolab-stage -f docker-compose.stage.yml --env-file .env.staging up -d

            # Wait for server health to avoid external health check flaps
            echo "⏳ Waiting for convolab-server-stage to become healthy..."
            for i in {1..60}; do
              status=$(docker inspect -f '{{.State.Health.Status}}' convolab-server-stage 2>/dev/null || echo "missing")
              echo "Server health: $status"
              if [ "$status" = "healthy" ]; then
                echo "✅ convolab-server-stage is healthy."
                break
              fi
              if [ "$status" = "unhealthy" ]; then
                echo "❌ convolab-server-stage reported unhealthy. Recent logs:"
                docker logs --tail=200 convolab-server-stage || true
                exit 1
              fi
              sleep 5
            done

            if [ "$status" != "healthy" ]; then
              echo "❌ convolab-server-stage did not become healthy in time. Recent logs:"
              docker logs --tail=200 convolab-server-stage || true
              exit 1
            fi

            echo "🔎 Verifying stage route from droplet..."
            if ! curl -fsS https://stage.convo-lab.com/health | grep -q '"status":"ok"'; then
              echo "⚠️ External stage health is not passing yet."
              echo "Validating local stage endpoint on host port 3002..."
              curl -sS http://localhost:3002/health || true

              CADDY_CONTAINER=$(docker ps --format '{{.Names}}' | grep -i caddy | head -n1 || true)
              if [ -n "$CADDY_CONTAINER" ]; then
                echo "♻️ Reloading Caddy container: $CADDY_CONTAINER"
                docker exec "$CADDY_CONTAINER" caddy reload --config /etc/caddy/Caddyfile || \
                  docker restart "$CADDY_CONTAINER" || true
                echo "Recent Caddy logs:"
                docker logs --tail=100 "$CADDY_CONTAINER" || true
              else
                echo "⚠️ No Caddy container found; trying host service reload."
                systemctl reload caddy 2>/dev/null || systemctl restart caddy 2>/dev/null || true
              fi
            fi

            # Show status
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            docker compose -p convolab-stage -f docker-compose.stage.yml --env-file .env.staging ps
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Cleanup old images
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment complete!"
          ENDSSH

      - name: Health check
        run: |
          echo "🏥 Running health check..."
          echo "Waiting 60s for services to fully initialize..."
          sleep 60

          for i in {1..30}; do
            response_file="$(mktemp)"
            http_code=$(curl -sS -o "$response_file" -w "%{http_code}" https://stage.convo-lab.com/health || true)
            response=$(cat "$response_file" 2>/dev/null || true)
            rm -f "$response_file"

            if [ "$http_code" = "200" ] && echo "$response" | grep -q '"status":"ok"'; then
              echo "✅ Health check passed!"
              echo "HTTP: $http_code"
              echo "Response: $response"
              exit 0
            fi
            echo "Attempt $i/30 failed (HTTP: ${http_code:-n/a}), retrying in 5s..."
            echo "Response: $response"
            sleep 5
          done

          echo "❌ Health check failed after 30 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
