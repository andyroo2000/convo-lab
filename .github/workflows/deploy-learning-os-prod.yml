name: Deploy Learning OS (Production)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Immutable Learning OS image tag (main-<full-sha>)'
        required: true
        type: string
      smoke_user_email:
        description: 'Existing ConvoLab user used for import and proxy smoke checks'
        required: true
        type: string
      rebuild_database:
        description: 'Back up ConvoLab and rebuild the Learning OS database copy'
        required: true
        default: false
        type: boolean
      enable_settings:
        description: 'Desired state for the Learning OS settings read route'
        required: true
        default: true
        type: boolean
      enable_overview:
        description: 'Desired state for the Learning OS overview read route'
        required: true
        default: false
        type: boolean
      enable_browser:
        description: 'Desired state for the Learning OS browser list read route'
        required: true
        default: false
        type: boolean
      enable_browser_detail:
        description: 'Desired state for the Learning OS browser note-detail read route'
        required: true
        default: false
        type: boolean
      enable_new_queue:
        description: 'Desired state for the Learning OS new-card queue read route'
        required: true
        default: false
        type: boolean
      enable_settings_write:
        description: 'Desired state for Learning OS study-settings writes'
        required: true
        default: false
        type: boolean
      enable_new_queue_write:
        description: 'Desired state for Learning OS new-card queue reorder writes'
        required: true
        default: false
        type: boolean
      enable_review:
        description: 'Desired state for Learning OS study sessions, review grades, and undo'
        required: true
        default: false
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy private API and copied database
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate inputs
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          SMOKE_USER_EMAIL: ${{ inputs.smoke_user_email }}
          REBUILD_DATABASE: ${{ inputs.rebuild_database }}
          ENABLE_SETTINGS: ${{ inputs.enable_settings }}
          ENABLE_OVERVIEW: ${{ inputs.enable_overview }}
          ENABLE_BROWSER: ${{ inputs.enable_browser }}
          ENABLE_BROWSER_DETAIL: ${{ inputs.enable_browser_detail }}
          ENABLE_NEW_QUEUE: ${{ inputs.enable_new_queue }}
          ENABLE_SETTINGS_WRITE: ${{ inputs.enable_settings_write }}
          ENABLE_NEW_QUEUE_WRITE: ${{ inputs.enable_new_queue_write }}
          ENABLE_REVIEW: ${{ inputs.enable_review }}
        run: |
          if ! [[ "$IMAGE_TAG" =~ ^main-[0-9a-f]{40}$ ]]; then
            echo "::error::image_tag must be an immutable main-<full-sha> tag"
            exit 1
          fi

          if ! [[ "$SMOKE_USER_EMAIL" =~ ^[^[:space:]@]+@[^[:space:]@]+\.[^[:space:]@]+$ ]]; then
            echo "::error::smoke_user_email is not a valid email address"
            exit 1
          fi

          validate_boolean_input() {
            case "$2" in
              true|false) ;;
              *) echo "::error::$1 must be a boolean"; exit 1 ;;
            esac
          }

          validate_boolean_input rebuild_database "$REBUILD_DATABASE"
          validate_boolean_input enable_settings "$ENABLE_SETTINGS"
          validate_boolean_input enable_overview "$ENABLE_OVERVIEW"
          validate_boolean_input enable_browser "$ENABLE_BROWSER"
          validate_boolean_input enable_browser_detail "$ENABLE_BROWSER_DETAIL"
          validate_boolean_input enable_new_queue "$ENABLE_NEW_QUEUE"
          validate_boolean_input enable_settings_write "$ENABLE_SETTINGS_WRITE"
          validate_boolean_input enable_new_queue_write "$ENABLE_NEW_QUEUE_WRITE"
          validate_boolean_input enable_review "$ENABLE_REVIEW"

          if [ "$ENABLE_SETTINGS_WRITE" = true ] && [ "$ENABLE_SETTINGS" != true ]; then
            echo "::error::enable_settings_write requires enable_settings"
            exit 1
          fi
          if [ "$ENABLE_NEW_QUEUE_WRITE" = true ] && [ "$ENABLE_NEW_QUEUE" != true ]; then
            echo "::error::enable_new_queue_write requires enable_new_queue"
            exit 1
          fi

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy Learning OS
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          SMOKE_USER_EMAIL: ${{ inputs.smoke_user_email }}
          REBUILD_DATABASE: ${{ inputs.rebuild_database }}
          ENABLE_SETTINGS: ${{ inputs.enable_settings }}
          ENABLE_OVERVIEW: ${{ inputs.enable_overview }}
          ENABLE_BROWSER: ${{ inputs.enable_browser }}
          ENABLE_BROWSER_DETAIL: ${{ inputs.enable_browser_detail }}
          ENABLE_NEW_QUEUE: ${{ inputs.enable_new_queue }}
          ENABLE_SETTINGS_WRITE: ${{ inputs.enable_settings_write }}
          ENABLE_NEW_QUEUE_WRITE: ${{ inputs.enable_new_queue_write }}
          ENABLE_REVIEW: ${{ inputs.enable_review }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DEPLOY_GH_PAT: ${{ secrets.GH_PAT }}
          DEPLOY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_GITHUB_ACTOR: ${{ github.actor }}
        run: |
          printf -v REMOTE_ENV \
            'IMAGE_TAG=%q SMOKE_USER_EMAIL=%q REBUILD_DATABASE=%q ENABLE_SETTINGS=%q ENABLE_OVERVIEW=%q ENABLE_BROWSER=%q ENABLE_BROWSER_DETAIL=%q ENABLE_NEW_QUEUE=%q ENABLE_SETTINGS_WRITE=%q ENABLE_NEW_QUEUE_WRITE=%q ENABLE_REVIEW=%q DEPLOY_GH_PAT=%q DEPLOY_GITHUB_TOKEN=%q DEPLOY_GITHUB_ACTOR=%q' \
            "$IMAGE_TAG" "$SMOKE_USER_EMAIL" "$REBUILD_DATABASE" "$ENABLE_SETTINGS" \
            "$ENABLE_OVERVIEW" "$ENABLE_BROWSER" "$ENABLE_BROWSER_DETAIL" "$ENABLE_NEW_QUEUE" \
            "$ENABLE_SETTINGS_WRITE" "$ENABLE_NEW_QUEUE_WRITE" "$ENABLE_REVIEW" "$DEPLOY_GH_PAT" \
            "$DEPLOY_GITHUB_TOKEN" "$DEPLOY_GITHUB_ACTOR"

          deployment_log="$(mktemp)"
          trap 'rm -f "$deployment_log"' EXIT

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$DROPLET_USER@$DROPLET_HOST" \
            "$REMOTE_ENV bash -s" << 'ENDSSH' | tee "$deployment_log"
            set -euo pipefail

            COMPOSE="docker compose -p convolab-prod -f docker-compose.prod.yml --env-file .env.production"
            BACKUP_DIR="/opt/convolab-backups"
            RUNTIME_DIR="/opt/convolab-runtime"
            ACTIVE_COLOR_FILE="$RUNTIME_DIR/prod-active-color"
            SOURCE_DB="learning_os_convolab_source"
            TARGET_DB="learning_os"
            KNOWLEDGE_EXPORT_DIR=""
            KNOWLEDGE_CONTAINER_PREFIX="/tmp/convolab-learning-os-knowledge"

            cleanup_knowledge_exports() {
              if [ -n "$KNOWLEDGE_EXPORT_DIR" ]; then
                rm -rf "$KNOWLEDGE_EXPORT_DIR"
              fi
              docker exec convolab-postgres rm -f \
                "$KNOWLEDGE_CONTAINER_PREFIX-profiles.csv" \
                "$KNOWLEDGE_CONTAINER_PREFIX-connections.csv" \
                "$KNOWLEDGE_CONTAINER_PREFIX-kanji.csv" 2>/dev/null || true
            }

            trap cleanup_knowledge_exports EXIT

            cd /opt/convolab

            git config credential.helper store
            echo "https://$DEPLOY_GH_PAT@github.com" > ~/.git-credentials
            chmod 600 ~/.git-credentials
            git fetch origin
            git reset --hard origin/main

            upsert_env() {
              key="$1"
              value="$2"
              escaped_value="${value//\\/\\\\}"
              escaped_value="${escaped_value//#/\\#}"
              escaped_value="${escaped_value//&/\\&}"

              if grep -q "^${key}=" .env.production; then
                sed -i "s#^${key}=.*#${key}=${escaped_value}#" .env.production
              else
                printf '%s=%s\n' "$key" "$value" >> .env.production
              fi
            }

            wait_for_health() {
              container="$1"

              for attempt in {1..60}; do
                status="$(docker inspect --format='{{.State.Health.Status}}' "$container" 2>/dev/null || echo missing)"
                echo "$container health attempt $attempt/60: $status"

                if [ -z "$status" ] || [ "$status" = missing ]; then
                  echo "$container has no Docker healthcheck; cannot health-gate it."
                  docker logs --tail=200 "$container" || true
                  return 1
                fi

                if [ "$status" = healthy ]; then
                  return 0
                fi

                if [ "$status" = unhealthy ]; then
                  docker logs --tail=200 "$container" || true
                  return 1
                fi

                sleep 5
              done

              docker logs --tail=200 "$container" || true
              return 1
            }

            upsert_env LEARNING_OS_IMAGE_TAG "$IMAGE_TAG"
            upsert_env LEARNING_OS_DB "$TARGET_DB"
            upsert_env LEARNING_OS_API_URL "http://learning-os:8080"
            upsert_env LEARNING_OS_PROXY_USER_EMAIL "$SMOKE_USER_EMAIL"

            if ! grep -Eq '^LEARNING_OS_APP_KEY=base64:.+$' .env.production; then
              upsert_env LEARNING_OS_APP_KEY "base64:$(openssl rand -base64 32 | tr -d '\n')"
            fi

            echo "$DEPLOY_GITHUB_TOKEN" | docker login ghcr.io -u "$DEPLOY_GITHUB_ACTOR" --password-stdin
            timeout 600 $COMPOSE pull learning-os learning-os-worker
            $COMPOSE up -d postgres

            if [ "$REBUILD_DATABASE" = true ]; then
              mkdir -p "$BACKUP_DIR"
              chmod 700 "$BACKUP_DIR"
              timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
              source_dump="$BACKUP_DIR/convolab-before-learning-os-$timestamp.dump"
              preserved_profile_count=0
              preserved_connection_count=0
              preserved_kanji_count=0

              $COMPOSE stop learning-os learning-os-worker 2>/dev/null || true

              echo "Creating immutable ConvoLab backup: $source_dump"
              docker exec convolab-postgres pg_dump \
                --username="$(sed -n 's/^POSTGRES_USER=//p' .env.production | tail -1)" \
                --dbname="$(sed -n 's/^POSTGRES_DB=//p' .env.production | tail -1)" \
                --format=custom --no-owner --no-acl > "$source_dump"
              chmod 600 "$source_dump"
              test -s "$source_dump"

              postgres_user="$(sed -n 's/^POSTGRES_USER=//p' .env.production | tail -1)"

              if docker exec convolab-postgres psql --username="$postgres_user" --tuples-only --no-align \
                --dbname=postgres --command="SELECT 1 FROM pg_database WHERE datname = '$TARGET_DB'" | grep -qx 1; then
                target_dump="$BACKUP_DIR/learning-os-before-rebuild-$timestamp.dump"
                docker exec convolab-postgres pg_dump \
                  --username="$postgres_user" --dbname="$TARGET_DB" \
                  --format=custom --no-owner --no-acl > "$target_dump"
                chmod 600 "$target_dump"
                test -s "$target_dump"

                knowledge_table_count="$(docker exec convolab-postgres psql \
                  --username="$postgres_user" --dbname="$TARGET_DB" \
                  --tuples-only --no-align \
                  --command="
                    SELECT count(*)
                    FROM unnest(ARRAY[
                      to_regclass('public.japanese_knowledge_profiles'),
                      to_regclass('public.wanikani_connections'),
                      to_regclass('public.user_known_kanji')
                    ]) AS preserved_table(table_name)
                    WHERE table_name IS NOT NULL;
                  " | tr -d '[:space:]')"

                if [ "$knowledge_table_count" = 3 ]; then
                  KNOWLEDGE_EXPORT_DIR="$(mktemp -d "$BACKUP_DIR/learning-os-knowledge-$timestamp.XXXXXX")"
                  chmod 700 "$KNOWLEDGE_EXPORT_DIR"

                  docker exec convolab-postgres psql -X --quiet --set=ON_ERROR_STOP=1 \
                    --username="$postgres_user" --dbname="$TARGET_DB" \
                    --command="
                      COPY (
                        SELECT lower(btrim(users.email)),
                               profiles.knowledge_version,
                               profiles.created_at,
                               profiles.updated_at
                        FROM japanese_knowledge_profiles AS profiles
                        JOIN users ON users.id = profiles.user_id
                        ORDER BY lower(btrim(users.email))
                      ) TO STDOUT WITH (FORMAT csv, HEADER true);
                    " > "$KNOWLEDGE_EXPORT_DIR/profiles.csv"
                  docker exec convolab-postgres psql -X --quiet --set=ON_ERROR_STOP=1 \
                    --username="$postgres_user" --dbname="$TARGET_DB" \
                    --command="
                      COPY (
                        SELECT lower(btrim(users.email)),
                               connections.api_token,
                               connections.assignments_synced_through_at,
                               connections.last_synced_at,
                               connections.created_at,
                               connections.updated_at
                        FROM wanikani_connections AS connections
                        JOIN users ON users.id = connections.user_id
                        ORDER BY lower(btrim(users.email))
                      ) TO STDOUT WITH (FORMAT csv, HEADER true);
                    " > "$KNOWLEDGE_EXPORT_DIR/connections.csv"
                  docker exec convolab-postgres psql -X --quiet --set=ON_ERROR_STOP=1 \
                    --username="$postgres_user" --dbname="$TARGET_DB" \
                    --command="
                      COPY (
                        SELECT lower(btrim(users.email)),
                               known.character,
                               known.wanikani_subject_id,
                               known.wanikani_passed_at,
                               known.manually_added_at,
                               known.created_at,
                               known.updated_at
                        FROM user_known_kanji AS known
                        JOIN users ON users.id = known.user_id
                        ORDER BY lower(btrim(users.email)), known.character
                      ) TO STDOUT WITH (FORMAT csv, HEADER true);
                    " > "$KNOWLEDGE_EXPORT_DIR/kanji.csv"
                  chmod 600 "$KNOWLEDGE_EXPORT_DIR"/*.csv

                  preserved_profile_count="$(docker exec convolab-postgres psql \
                    --username="$postgres_user" --dbname="$TARGET_DB" \
                    --tuples-only --no-align \
                    --command='SELECT count(*) FROM japanese_knowledge_profiles' | tr -d '[:space:]')"
                  preserved_connection_count="$(docker exec convolab-postgres psql \
                    --username="$postgres_user" --dbname="$TARGET_DB" \
                    --tuples-only --no-align \
                    --command='SELECT count(*) FROM wanikani_connections' | tr -d '[:space:]')"
                  preserved_kanji_count="$(docker exec convolab-postgres psql \
                    --username="$postgres_user" --dbname="$TARGET_DB" \
                    --tuples-only --no-align \
                    --command='SELECT count(*) FROM user_known_kanji' | tr -d '[:space:]')"

                  echo "Preserved $preserved_connection_count WaniKani connections and $preserved_kanji_count known-kanji rows."
                elif [ "$knowledge_table_count" != 0 ]; then
                  echo "Learning OS Japanese knowledge schema is incomplete; refusing to rebuild." >&2
                  exit 1
                fi
              fi

              docker exec convolab-postgres dropdb --username="$postgres_user" --if-exists "$SOURCE_DB"
              docker exec convolab-postgres dropdb --username="$postgres_user" --if-exists "$TARGET_DB"
              docker exec convolab-postgres createdb --username="$postgres_user" "$SOURCE_DB"
              docker exec convolab-postgres createdb --username="$postgres_user" "$TARGET_DB"
              docker exec -i convolab-postgres pg_restore \
                --username="$postgres_user" --dbname="$SOURCE_DB" \
                --no-owner --no-acl < "$source_dump"

              # Compose run inherits stdin even without a TTY and could consume the remaining SSH script.
              $COMPOSE run --rm -T --no-deps learning-os php artisan migrate --force < /dev/null
              $COMPOSE run --rm -T --no-deps learning-os \
                php artisan rehearsal:import-convolab \
                --source-database="$SOURCE_DB" \
                --truncate \
                --skip-media \
                --allow-production \
                --production-truncate-confirmation="TRUNCATE $TARGET_DB" < /dev/null

              if [ -n "$KNOWLEDGE_EXPORT_DIR" ]; then
                docker cp "$KNOWLEDGE_EXPORT_DIR/profiles.csv" \
                  "convolab-postgres:$KNOWLEDGE_CONTAINER_PREFIX-profiles.csv"
                docker cp "$KNOWLEDGE_EXPORT_DIR/connections.csv" \
                  "convolab-postgres:$KNOWLEDGE_CONTAINER_PREFIX-connections.csv"
                docker cp "$KNOWLEDGE_EXPORT_DIR/kanji.csv" \
                  "convolab-postgres:$KNOWLEDGE_CONTAINER_PREFIX-kanji.csv"

                docker exec -i convolab-postgres psql -X --set=ON_ERROR_STOP=1 \
                  --username="$postgres_user" --dbname="$TARGET_DB" <<'SQL'
                  BEGIN;

                  CREATE TEMP TABLE preserved_knowledge_profiles (
                    email text NOT NULL,
                    knowledge_version bigint NOT NULL,
                    created_at timestamp,
                    updated_at timestamp
                  );
                  CREATE TEMP TABLE preserved_wanikani_connections (
                    email text NOT NULL,
                    api_token text NOT NULL,
                    assignments_synced_through_at timestamp(6),
                    last_synced_at timestamp(6),
                    created_at timestamp,
                    updated_at timestamp
                  );
                  CREATE TEMP TABLE preserved_known_kanji (
                    email text NOT NULL,
                    character varchar(4) NOT NULL,
                    wanikani_subject_id bigint,
                    wanikani_passed_at timestamp(6),
                    manually_added_at timestamp(6),
                    created_at timestamp,
                    updated_at timestamp
                  );

                  \copy preserved_knowledge_profiles FROM '/tmp/convolab-learning-os-knowledge-profiles.csv' WITH (FORMAT csv, HEADER true)
                  \copy preserved_wanikani_connections FROM '/tmp/convolab-learning-os-knowledge-connections.csv' WITH (FORMAT csv, HEADER true)
                  \copy preserved_known_kanji FROM '/tmp/convolab-learning-os-knowledge-kanji.csv' WITH (FORMAT csv, HEADER true)

                  DO $restore$
                  BEGIN
                    IF EXISTS (
                      SELECT 1
                      FROM (
                        SELECT email FROM preserved_knowledge_profiles
                        UNION
                        SELECT email FROM preserved_wanikani_connections
                        UNION
                        SELECT email FROM preserved_known_kanji
                      ) AS preserved_users
                      LEFT JOIN users ON lower(btrim(users.email)) = preserved_users.email
                      WHERE users.id IS NULL
                    ) THEN
                      RAISE EXCEPTION 'Cannot restore Japanese knowledge for an unmatched user email';
                    END IF;
                  END
                  $restore$;

                  INSERT INTO japanese_knowledge_profiles (
                    user_id, knowledge_version, created_at, updated_at
                  )
                  SELECT users.id,
                         preserved.knowledge_version,
                         preserved.created_at,
                         preserved.updated_at
                  FROM preserved_knowledge_profiles AS preserved
                  JOIN users ON lower(btrim(users.email)) = preserved.email
                  ON CONFLICT (user_id) DO UPDATE
                  SET knowledge_version = EXCLUDED.knowledge_version,
                      created_at = EXCLUDED.created_at,
                      updated_at = EXCLUDED.updated_at;

                  INSERT INTO wanikani_connections (
                    user_id, api_token, assignments_synced_through_at, last_synced_at,
                    created_at, updated_at
                  )
                  SELECT users.id,
                         preserved.api_token,
                         preserved.assignments_synced_through_at,
                         preserved.last_synced_at,
                         preserved.created_at,
                         preserved.updated_at
                  FROM preserved_wanikani_connections AS preserved
                  JOIN users ON lower(btrim(users.email)) = preserved.email
                  ON CONFLICT (user_id) DO UPDATE
                  SET api_token = EXCLUDED.api_token,
                      assignments_synced_through_at = EXCLUDED.assignments_synced_through_at,
                      last_synced_at = EXCLUDED.last_synced_at,
                      created_at = EXCLUDED.created_at,
                      updated_at = EXCLUDED.updated_at;

                  INSERT INTO user_known_kanji (
                    user_id, character, wanikani_subject_id, wanikani_passed_at,
                    manually_added_at, created_at, updated_at
                  )
                  SELECT users.id,
                         preserved.character,
                         preserved.wanikani_subject_id,
                         preserved.wanikani_passed_at,
                         preserved.manually_added_at,
                         preserved.created_at,
                         preserved.updated_at
                  FROM preserved_known_kanji AS preserved
                  JOIN users ON lower(btrim(users.email)) = preserved.email
                  ON CONFLICT (user_id, character) DO UPDATE
                  SET wanikani_subject_id = EXCLUDED.wanikani_subject_id,
                      wanikani_passed_at = EXCLUDED.wanikani_passed_at,
                      manually_added_at = EXCLUDED.manually_added_at,
                      created_at = EXCLUDED.created_at,
                      updated_at = EXCLUDED.updated_at;

                  COMMIT;
          SQL

                restored_profile_count="$(docker exec convolab-postgres psql \
                  --username="$postgres_user" --dbname="$TARGET_DB" \
                  --tuples-only --no-align \
                  --command='SELECT count(*) FROM japanese_knowledge_profiles' | tr -d '[:space:]')"
                restored_connection_count="$(docker exec convolab-postgres psql \
                  --username="$postgres_user" --dbname="$TARGET_DB" \
                  --tuples-only --no-align \
                  --command='SELECT count(*) FROM wanikani_connections' | tr -d '[:space:]')"
                restored_kanji_count="$(docker exec convolab-postgres psql \
                  --username="$postgres_user" --dbname="$TARGET_DB" \
                  --tuples-only --no-align \
                  --command='SELECT count(*) FROM user_known_kanji' | tr -d '[:space:]')"

                if [ "$restored_profile_count" != "$preserved_profile_count" ] \
                  || [ "$restored_connection_count" != "$preserved_connection_count" ] \
                  || [ "$restored_kanji_count" != "$preserved_kanji_count" ]; then
                  echo "Japanese knowledge restore count mismatch." >&2
                  exit 1
                fi

                echo "Restored $restored_connection_count WaniKani connections and $restored_kanji_count known-kanji rows."
                cleanup_knowledge_exports
                KNOWLEDGE_EXPORT_DIR=""
              fi

              $COMPOSE run --rm -T --no-deps learning-os \
                php artisan rehearsal:smoke \
                --user-email="$SMOKE_USER_EMAIL" \
                --allow-production \
                --json < /dev/null

              docker exec convolab-postgres dropdb --username="$postgres_user" "$SOURCE_DB"
            else
              $COMPOSE run --rm -T --no-deps learning-os php artisan migrate --force < /dev/null
            fi

            proxy_token_output="$($COMPOSE run --rm -T --no-deps \
              -e CONVOLAB_PROXY_USER_EMAIL="$SMOKE_USER_EMAIL" \
              learning-os php artisan tinker --execute='
                $user = App\Models\User::query()->where("email", getenv("CONVOLAB_PROXY_USER_EMAIL"))->sole();
                $user->tokens()->where("name", "convolab-proxy")->delete();
                echo $user->createToken("convolab-proxy", ["study:read", "study:write"])->plainTextToken;
              ' < /dev/null)"
            proxy_token="$(printf '%s\n' "$proxy_token_output" \
              | grep -E '^[0-9]+\|learning_os_[[:alnum:]]{40}[0-9a-f]{8}$' \
              | tail -1)"
            test -n "$proxy_token"
            echo "::add-mask::$proxy_token"
            upsert_env LEARNING_OS_API_TOKEN "$proxy_token"

            $COMPOSE up -d --no-deps --force-recreate learning-os learning-os-worker
            wait_for_health learning-os-api
            wait_for_health learning-os-worker

            docker exec -e API_TOKEN="$proxy_token" learning-os-api php -r '
              $context = stream_context_create(["http" => [
                  "header" => "Accept: application/json\r\nAuthorization: Bearer ".getenv("API_TOKEN")."\r\n",
                  "timeout" => 10,
              ]]);
              $body = file_get_contents("http://127.0.0.1:8080/api/study/settings", false, $context);
              if ($body === false || ! is_array(json_decode($body, true))) { exit(1); }
            '

            active_color=blue
            if [ -s "$ACTIVE_COLOR_FILE" ]; then
              active_color="$(cat "$ACTIVE_COLOR_FILE")"
            fi
            case "$active_color" in
              blue|green) ;;
              *) echo "Invalid active production color: $active_color"; exit 1 ;;
            esac

            $COMPOSE up -d --no-deps --force-recreate "server-$active_color"
            wait_for_health "convolab-server-$active_color"

            postgres_user="$(sed -n 's/^POSTGRES_USER=//p' .env.production | tail -1)"
            postgres_db="$(sed -n 's/^POSTGRES_DB=//p' .env.production | tail -1)"

            flag_state="$(docker exec convolab-postgres psql \
              --username="$postgres_user" --dbname="$postgres_db" \
              --tuples-only --no-align --field-separator='|' \
              --command='SELECT "studyApiEnabled", "studyApiSettings", "studyApiOverview", "studyApiBrowser", "studyApiBrowserDetail", "studyApiNewQueue", "studyApiImports", "studyApiSettingsWrite", "studyApiNewQueueWrite", "studyApiReview" FROM "feature_flags" LIMIT 1')"
            IFS='|' read -r previous_parent previous_settings previous_overview previous_browser previous_browser_detail previous_new_queue previous_imports previous_settings_write previous_new_queue_write previous_review <<< "$flag_state"
            if [ -z "$previous_review" ]; then
              echo "Unable to capture the existing Study API feature flags."
              exit 1
            fi

            sql_bool() {
              case "$1" in
                true|t) printf 'true' ;;
                false|f) printf 'false' ;;
                *) echo "Invalid boolean value: $1" >&2; return 1 ;;
              esac
            }

            previous_parent_sql="$(sql_bool "$previous_parent")"
            previous_settings_sql="$(sql_bool "$previous_settings")"
            previous_overview_sql="$(sql_bool "$previous_overview")"
            previous_browser_sql="$(sql_bool "$previous_browser")"
            previous_browser_detail_sql="$(sql_bool "$previous_browser_detail")"
            previous_new_queue_sql="$(sql_bool "$previous_new_queue")"
            previous_imports_sql="$(sql_bool "$previous_imports")"
            previous_settings_write_sql="$(sql_bool "$previous_settings_write")"
            previous_new_queue_write_sql="$(sql_bool "$previous_new_queue_write")"
            previous_review_sql="$(sql_bool "$previous_review")"

            rollback_study_flags() {
              docker exec convolab-postgres psql --username="$postgres_user" --dbname="$postgres_db" \
                --set=ON_ERROR_STOP=1 --command="
                  UPDATE \"feature_flags\"
                  SET \"studyApiEnabled\" = $previous_parent_sql,
                      \"studyApiSettings\" = $previous_settings_sql,
                      \"studyApiOverview\" = $previous_overview_sql,
                      \"studyApiBrowser\" = $previous_browser_sql,
                      \"studyApiBrowserDetail\" = $previous_browser_detail_sql,
                      \"studyApiNewQueue\" = $previous_new_queue_sql,
                      \"studyApiImports\" = $previous_imports_sql,
                      \"studyApiSettingsWrite\" = $previous_settings_write_sql,
                      \"studyApiNewQueueWrite\" = $previous_new_queue_write_sql,
                      \"studyApiReview\" = $previous_review_sql,
                      \"updatedAt\" = NOW();
                " || true
              echo "Learning OS Study API flags were rolled back."
            }

            verification_pending=true
            trap 'if [ "${verification_pending:-false}" = true ]; then rollback_study_flags; fi' EXIT

            desired_parent=false
            if [ "$ENABLE_SETTINGS" = true ] || [ "$ENABLE_OVERVIEW" = true ] \
              || [ "$ENABLE_BROWSER" = true ] || [ "$ENABLE_BROWSER_DETAIL" = true ] \
              || [ "$ENABLE_NEW_QUEUE" = true ] || [ "$ENABLE_REVIEW" = true ]; then
              desired_parent=true
            fi

            desired_parent_sql="$(sql_bool "$desired_parent")"
            enable_settings_sql="$(sql_bool "$ENABLE_SETTINGS")"
            enable_overview_sql="$(sql_bool "$ENABLE_OVERVIEW")"
            enable_browser_sql="$(sql_bool "$ENABLE_BROWSER")"
            enable_browser_detail_sql="$(sql_bool "$ENABLE_BROWSER_DETAIL")"
            enable_new_queue_sql="$(sql_bool "$ENABLE_NEW_QUEUE")"
            enable_settings_write_sql="$(sql_bool "$ENABLE_SETTINGS_WRITE")"
            enable_new_queue_write_sql="$(sql_bool "$ENABLE_NEW_QUEUE_WRITE")"
            enable_review_sql="$(sql_bool "$ENABLE_REVIEW")"

            docker exec convolab-postgres psql --username="$postgres_user" --dbname="$postgres_db" \
              --set=ON_ERROR_STOP=1 --command="
                UPDATE \"feature_flags\"
                SET \"studyApiEnabled\" = $desired_parent_sql,
                    \"studyApiSettings\" = $enable_settings_sql,
                    \"studyApiOverview\" = $enable_overview_sql,
                    \"studyApiBrowser\" = $enable_browser_sql,
                    \"studyApiBrowserDetail\" = $enable_browser_detail_sql,
                    \"studyApiNewQueue\" = $enable_new_queue_sql,
                    \"studyApiImports\" = false,
                    \"studyApiSettingsWrite\" = $enable_settings_write_sql,
                    \"studyApiNewQueueWrite\" = $enable_new_queue_write_sql,
                    \"studyApiReview\" = $enable_review_sql,
                    \"updatedAt\" = NOW();
              "

            expected_flag_state="$desired_parent_sql|$enable_settings_sql|$enable_overview_sql|$enable_browser_sql|$enable_browser_detail_sql|$enable_new_queue_sql|false|$enable_settings_write_sql|$enable_new_queue_write_sql|$enable_review_sql"
            expected_flag_state="${expected_flag_state//true/t}"
            expected_flag_state="${expected_flag_state//false/f}"
            flag_state="$(docker exec convolab-postgres psql \
              --username="$postgres_user" --dbname="$postgres_db" \
              --tuples-only --no-align --field-separator='|' \
              --command='SELECT "studyApiEnabled", "studyApiSettings", "studyApiOverview", "studyApiBrowser", "studyApiBrowserDetail", "studyApiNewQueue", "studyApiImports", "studyApiSettingsWrite", "studyApiNewQueueWrite", "studyApiReview" FROM "feature_flags" LIMIT 1')"
            if [ "$flag_state" != "$expected_flag_state" ]; then
              echo "Unexpected Study API feature flag state: $flag_state"
              exit 1
            fi

            if [ "$desired_parent" = true ]; then
              user_record="$(printf '%s\n' \
                "SELECT id, role FROM \"User\" WHERE email = :'email' LIMIT 1;" \
                | docker exec -i convolab-postgres psql \
                  --username="$postgres_user" --dbname="$postgres_db" \
                  --tuples-only --no-align --field-separator='|' \
                  --set=email="$SMOKE_USER_EMAIL")"
              user_id="${user_record%%|*}"
              user_role="${user_record#*|}"
              test -n "$user_id"
              test "$user_role" != "$user_record"

              auth_token="$(docker exec \
                -e AUTH_USER_ID="$user_id" \
                -e AUTH_USER_ROLE="$user_role" \
                "convolab-server-$active_color" \
                node --input-type=module --eval='
                  import jwt from "jsonwebtoken";
                  process.stdout.write(jwt.sign(
                    { userId: process.env.AUTH_USER_ID, role: process.env.AUTH_USER_ROLE },
                    process.env.JWT_SECRET,
                    { expiresIn: "5m" },
                  ));
                ')"
              test -n "$auth_token"
              echo "::add-mask::$auth_token"

              fetch_read_route() {
                local label="$1"
                local path="$2"
                local response=""
                local attempt

                for attempt in {1..12}; do
                  if response="$(curl --fail --silent --show-error \
                    --header 'Accept: application/json' \
                    --cookie "token=$auth_token" \
                    "https://convo-lab.com$path")"; then
                    printf '%s' "$response"
                    return 0
                  fi
                  echo "$label attempt $attempt/12 failed; retrying." >&2
                  sleep 3
                done

                return 1
              }

              stream_json_pair() {
                # Stream newline-delimited base64 so large study sessions do not exceed exec ARG_MAX.
                printf '%s' "$1" | base64 | tr -d '\n'
                printf '\n'
                printf '%s' "$2" | base64 | tr -d '\n'
                printf '\n'
              }

              compare_read_route() {
                local label="$1"
                local legacy_path="$2"
                local proxy_path="$3"
                local comparison_mode="${4:-strict}"
                local comparison_script
                local legacy_response
                local proxy_response
                case "$comparison_mode" in
                  strict|opaque-cursor|overview-state|new-queue-state) ;;
                  *) echo "Unknown response comparison mode: $comparison_mode" >&2; return 1 ;;
                esac
                legacy_response="$(fetch_read_route "$label legacy" "$legacy_path")"
                proxy_response="$(fetch_read_route "$label proxy" "$proxy_path")"

                comparison_script="$(cat .github/scripts/compare-study-read-responses.mjs)"
                stream_json_pair "$legacy_response" "$proxy_response" | docker exec -i \
                  -e COMPARISON_MODE="$comparison_mode" \
                  -e STUDY_RESPONSE_COMPARISON_CLI=true \
                  "convolab-server-$active_color" \
                  node --input-type=module --eval="$comparison_script"
                echo "$label legacy and Learning OS responses match."
              }

              assert_json_equal() {
                local label="$1"
                local expected="$2"
                local actual="$3"

                stream_json_pair "$expected" "$actual" | docker exec -i \
                  "convolab-server-$active_color" \
                  node --input-type=module --eval='
                    import assert from "node:assert/strict";
                    process.stdin.setEncoding("utf8");
                    let input = "";
                    for await (const chunk of process.stdin) input += chunk;
                    const fields = input.trimEnd().split("\n");
                    if (fields.length !== 2) {
                      console.error("Expected exactly two framed mutation responses.");
                      process.exit(1);
                    }
                    const [expectedEncoded, actualEncoded] = fields;
                    let expectedResponse;
                    let actualResponse;
                    try {
                      expectedResponse = JSON.parse(Buffer.from(expectedEncoded, "base64"));
                      actualResponse = JSON.parse(Buffer.from(actualEncoded, "base64"));
                    } catch {
                      console.error("Expected or actual mutation response is not valid JSON.");
                      process.exit(1);
                    }
                    const differingPaths = (actualValue, expectedValue, path = "$") => {
                      if (Object.is(actualValue, expectedValue)) return [];
                      if (
                        actualValue === null || expectedValue === null ||
                        typeof actualValue !== "object" || typeof expectedValue !== "object" ||
                        Array.isArray(actualValue) !== Array.isArray(expectedValue)
                      ) return [path];
                      if (
                        Array.isArray(actualValue) && actualValue.length !== expectedValue.length
                      ) return [`${path}.length`];
                      const keys = new Set([
                        ...Object.keys(actualValue),
                        ...Object.keys(expectedValue),
                      ]);
                      return [...keys].flatMap((key) =>
                        key in actualValue && key in expectedValue
                          ? differingPaths(
                              actualValue[key],
                              expectedValue[key],
                              `${path}.${key}`,
                            )
                          : [`${path}.${key}`]
                      );
                    };
                    try {
                      assert.deepStrictEqual(actualResponse, expectedResponse);
                    } catch {
                      console.error("Mutation changed the stable response contract.");
                      const paths = differingPaths(actualResponse, expectedResponse);
                      console.error(`Differing JSON paths: ${paths.slice(0, 50).join(", ")}`);
                      process.exit(1);
                    }
                  '
                echo "$label idempotent write smoke check passed."
              }

              assert_queue_order_equal() {
                local expected="$1"
                local actual="$2"

                stream_json_pair "$expected" "$actual" | docker exec -i \
                  "convolab-server-$active_color" \
                  node --input-type=module --eval='
                    import assert from "node:assert/strict";
                    process.stdin.setEncoding("utf8");
                    let input = "";
                    for await (const chunk of process.stdin) input += chunk;
                    const fields = input.trimEnd().split("\n");
                    if (fields.length !== 2) {
                      console.error("Expected exactly two framed New Queue responses.");
                      process.exit(1);
                    }
                    const responses = fields.map((field) =>
                      JSON.parse(Buffer.from(field, "base64"))
                    );
                    const ids = (response) => {
                      if (!Array.isArray(response.items)) {
                        throw new TypeError("New Queue response has no items array.");
                      }
                      return response.items.map(({ id }) => id);
                    };
                    try {
                      assert.deepStrictEqual(ids(responses[1]), ids(responses[0]));
                    } catch (error) {
                      console.error(
                        error instanceof TypeError
                          ? error.message
                          : "New Queue reorder changed card membership or order."
                      );
                      process.exit(1);
                    }
                  '
                echo "New Queue reorder preserved card membership and order."
              }

              validate_session_response() {
                local response="$1"

                printf '%s' "$response" | docker exec -i \
                  "convolab-server-$active_color" \
                  node --input-type=module --eval='
                    process.stdin.setEncoding("utf8");
                    let input = "";
                    for await (const chunk of process.stdin) input += chunk;
                    const response = JSON.parse(input);
                    if (!Array.isArray(response.cards)) {
                      console.error("Learning OS session response has no cards array.");
                      process.exit(1);
                    }
                    if (response.overview === null || typeof response.overview !== "object") {
                      console.error("Learning OS session response has no overview object.");
                      process.exit(1);
                    }
                  '
                echo "Study session Learning OS smoke check passed."
              }

              mutate_proxy_route() {
                local method="$1"
                local path="$2"
                local body="$3"
                local response_file
                local status

                response_file="$(mktemp)"
                status="$(curl --silent --show-error \
                  --output "$response_file" \
                  --write-out '%{http_code}' \
                  --request "$method" \
                  --header 'Accept: application/json' \
                  --header 'Content-Type: application/json' \
                  --header 'Origin: https://convo-lab.com' \
                  --header "X-CSRF-Token: $csrf_token" \
                  --header "Cookie: token=$auth_token; XSRF-TOKEN=$csrf_cookie_raw" \
                  --data "$body" \
                  "https://convo-lab.com$path")"

                if [[ ! "$status" =~ ^2[0-9][0-9]$ ]]; then
                  echo "$method $path failed with HTTP $status:" >&2
                  cat "$response_file" >&2
                  echo >&2
                  rm -f "$response_file"
                  return 1
                fi

                cat "$response_file"
                rm -f "$response_file"
              }

              if [ "$ENABLE_SETTINGS" = true ] && [ "$ENABLE_SETTINGS_WRITE" != true ]; then
                compare_read_route Settings '/api/study/settings' '/api/learning-os/study/settings'
              fi
              if [ "$ENABLE_OVERVIEW" = true ]; then
                compare_read_route \
                  Overview \
                  '/api/study/overview?timeZone=America%2FNew_York' \
                  '/api/learning-os/study/overview?timeZone=America%2FNew_York' \
                  overview-state
              fi
              if [ "$ENABLE_BROWSER" = true ]; then
                compare_read_route \
                  Browser \
                  '/api/study/browser?sortField=created_on&sortDirection=desc&limit=25' \
                  '/api/learning-os/study/browser?sortField=created_on&sortDirection=desc&limit=25' \
                  opaque-cursor
              fi
              if [ "$ENABLE_BROWSER_DETAIL" = true ]; then
                browser_list="$(fetch_read_route 'Browser detail note lookup' '/api/study/browser?sortField=created_on&sortDirection=desc&limit=1')"
                browser_note_id="$(docker exec -e BROWSER_RESPONSE="$browser_list" \
                  "convolab-server-$active_color" node --input-type=module --eval='
                    const r=JSON.parse(process.env.BROWSER_RESPONSE),n=r?.rows?.[0]?.noteId;
                    if(typeof n!=="string"||!/^[A-Za-z0-9-]+$/.test(n))process.exit(1);
                    process.stdout.write(n);
                  ')"
                test -n "$browser_note_id"
                compare_read_route BrowserDetail "/api/study/browser/$browser_note_id" \
                  "/api/learning-os/study/browser/$browser_note_id"
              fi
              if [ "$ENABLE_NEW_QUEUE" = true ] && [ "$ENABLE_NEW_QUEUE_WRITE" != true ]; then
                compare_read_route \
                  NewQueue \
                  '/api/study/new-queue?limit=25' \
                  '/api/learning-os/study/new-queue?limit=25' \
                  new-queue-state
              fi

              if [ "$ENABLE_SETTINGS_WRITE" = true ] || [ "$ENABLE_NEW_QUEUE_WRITE" = true ] \
                || [ "$ENABLE_REVIEW" = true ]; then
                csrf_cookie_jar="$(mktemp)"
                curl --fail --silent --show-error \
                  --cookie "token=$auth_token" \
                  --cookie-jar "$csrf_cookie_jar" \
                  --header 'Origin: https://convo-lab.com' \
                  'https://convo-lab.com/api/auth/csrf' > /dev/null
                csrf_cookie_raw="$(awk '$6 == "XSRF-TOKEN" { value = $7 } END { print value }' "$csrf_cookie_jar")"
                rm -f "$csrf_cookie_jar"
                test -n "$csrf_cookie_raw"
                csrf_token="$(docker exec \
                  -e RAW_CSRF_TOKEN="$csrf_cookie_raw" \
                  "convolab-server-$active_color" \
                  node --input-type=module --eval='process.stdout.write(decodeURIComponent(process.env.RAW_CSRF_TOKEN))')"
                test -n "$csrf_token"
              fi

              if [ "$ENABLE_REVIEW" = true ]; then
                session_body='{"timeZone":"America/New_York"}'
                # Session start introduces cards, so never invoke the legacy route during cutover.
                proxy_session="$(mutate_proxy_route POST '/api/learning-os/study/session/start' "$session_body")"
                validate_session_response "$proxy_session"
              fi

              if [ "$ENABLE_SETTINGS_WRITE" = true ]; then
                settings_before="$(fetch_read_route 'Settings write baseline' '/api/learning-os/study/settings')"
                settings_body="$(docker exec \
                  -e SETTINGS_RESPONSE="$settings_before" \
                  "convolab-server-$active_color" \
                  node --input-type=module --eval='
                    const settings = JSON.parse(process.env.SETTINGS_RESPONSE);
                    process.stdout.write(JSON.stringify({ newCardsPerDay: settings.newCardsPerDay }));
                  ')"
                settings_after="$(mutate_proxy_route PATCH '/api/learning-os/study/settings' "$settings_body")"
                assert_json_equal Settings "$settings_before" "$settings_after"
              fi

              if [ "$ENABLE_NEW_QUEUE_WRITE" = true ]; then
                queue_before="$(fetch_read_route 'New Queue write baseline' '/api/learning-os/study/new-queue?limit=100')"
                queue_body="$(docker exec \
                  -e QUEUE_RESPONSE="$queue_before" \
                  "convolab-server-$active_color" \
                  node --input-type=module --eval='
                    const queue = JSON.parse(process.env.QUEUE_RESPONSE);
                    if (!Array.isArray(queue.items) || queue.items.length < 1) process.exit(1);
                    process.stdout.write(JSON.stringify({ cardIds: queue.items.map(({ id }) => id) }));
                  ')"
                queue_after="$(mutate_proxy_route POST '/api/learning-os/study/new-queue/reorder' "$queue_body")"
                assert_queue_order_equal "$queue_before" "$queue_after"
                queue_stable="$(mutate_proxy_route POST '/api/learning-os/study/new-queue/reorder' "$queue_body")"
                assert_json_equal 'New Queue' "$queue_after" "$queue_stable"
              fi
            fi

            verification_pending=false
            trap - EXIT

            $COMPOSE ps learning-os learning-os-worker "server-$active_color"
            echo "Learning OS production deployment completed."
          ENDSSH

          grep -Fqx 'Learning OS production deployment completed.' "$deployment_log"
          rm -f "$deployment_log"
          trap - EXIT

      - name: Verify ConvoLab health
        run: curl --fail --silent --show-error https://convo-lab.com/health > /dev/null
