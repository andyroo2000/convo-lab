                  config("mail.default") !== "resend"
                  || blank(config("services.resend.key"))
                  || config("mail.from.address") !== getenv("EXPECTED_MAIL_FROM_ADDRESS")
                  || config("mail.from.name") !== getenv("EXPECTED_MAIL_FROM_NAME")
                  || config("services.convolab.client_url") !== getenv("EXPECTED_CLIENT_URL")
