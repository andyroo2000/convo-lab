name: Deploy Learning OS (Production)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Immutable Learning OS image tag (main-<full-sha>)'
        required: true
        type: string
      smoke_user_email:
        description: 'Existing ConvoLab user used for import and proxy smoke checks'
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy private API and copied database
    runs-on: ubuntu-latest
    # 10m image pull + 65m worker drain + 10m health gates + 15m setup/smoke.
    timeout-minutes: 100
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate inputs
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          SMOKE_USER_EMAIL: ${{ inputs.smoke_user_email }}
        run: |
          if ! [[ "$IMAGE_TAG" =~ ^main-[0-9a-f]{40}$ ]]; then
            echo "::error::image_tag must be an immutable main-<full-sha> tag"
            exit 1
          fi

          if ! [[ "$SMOKE_USER_EMAIL" =~ ^[^[:space:]@]+@[^[:space:]@]+\.[^[:space:]@]+$ ]]; then
            echo "::error::smoke_user_email is not a valid email address"
            exit 1
          fi

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy Learning OS
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          SMOKE_USER_EMAIL: ${{ inputs.smoke_user_email }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DEPLOY_GH_PAT: ${{ secrets.GH_PAT }}
          DEPLOY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_GITHUB_ACTOR: ${{ github.actor }}
        run: |
          printf -v REMOTE_ENV \
            'IMAGE_TAG=%q SMOKE_USER_EMAIL=%q DEPLOY_GH_PAT=%q DEPLOY_GITHUB_TOKEN=%q DEPLOY_GITHUB_ACTOR=%q' \
            "$IMAGE_TAG" "$SMOKE_USER_EMAIL" \
            "$DEPLOY_GH_PAT" "$DEPLOY_GITHUB_TOKEN" "$DEPLOY_GITHUB_ACTOR"

          deployment_log="$(mktemp)"
          trap 'rm -f "$deployment_log"' EXIT

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=150 \
            "$DROPLET_USER@$DROPLET_HOST" \
            "$REMOTE_ENV bash -s" << 'ENDSSH' | tee "$deployment_log"
            set -euo pipefail

            COMPOSE="docker compose -p convolab-prod -f docker-compose.prod.yml --env-file .env.production"
            RUNTIME_DIR="/opt/convolab-runtime"
            ACTIVE_COLOR_FILE="$RUNTIME_DIR/prod-active-color"
            TARGET_DB="learning_os"
            DRAINING_WORKER_CONTAINER_ID=""
            NEW_PROXY_TOKEN_ID=""
            PROXY_TOKEN_CUTOVER_STARTED=false
            WORKER_DRAIN_ATTEMPTS=780
            WORKER_DRAIN_INTERVAL_SECONDS=5
            WORKER_DRAIN_TIMEOUT_MINUTES=$((WORKER_DRAIN_ATTEMPTS * WORKER_DRAIN_INTERVAL_SECONDS / 60))

            cleanup_deployment_resources() {
              if [ -n "$NEW_PROXY_TOKEN_ID" ] && [ "$PROXY_TOKEN_CUTOVER_STARTED" != true ]; then
                echo "Removing the unused Learning OS proxy token."
                $COMPOSE run --rm -T --no-deps \
                  -e CONVOLAB_PROXY_USER_EMAIL="$SMOKE_USER_EMAIL" \
                  -e CONVOLAB_PROXY_TOKEN_ID="$NEW_PROXY_TOKEN_ID" \
                  learning-os php artisan tinker --execute='
                    $user = App\Models\User::query()
                      ->where("email", getenv("CONVOLAB_PROXY_USER_EMAIL"))
                      ->sole();
                    $user->tokens()
                      ->where("name", "convolab-proxy")
                      ->where("id", getenv("CONVOLAB_PROXY_TOKEN_ID"))
                      ->delete();
                  ' < /dev/null || true
              fi

              if [ -n "$DRAINING_WORKER_CONTAINER_ID" ]; then
                current_worker_id="$(docker inspect --format='{{.Id}}' learning-os-worker 2>/dev/null || true)"

                if [ "$current_worker_id" = "$DRAINING_WORKER_CONTAINER_ID" ]; then
                  echo "Restoring the previous Learning OS worker after an interrupted drain."
                  docker update --restart=unless-stopped learning-os-worker >/dev/null || true
                  docker start learning-os-worker >/dev/null || true
                fi
              fi
            }

            trap cleanup_deployment_resources EXIT

            cd /opt/convolab

            git config credential.helper store
            echo "https://$DEPLOY_GH_PAT@github.com" > ~/.git-credentials
            chmod 600 ~/.git-credentials
            git fetch origin
            git reset --hard origin/main

            upsert_env() {
              key="$1"
              value="$2"
              escaped_value="${value//\\/\\\\}"
              escaped_value="${escaped_value//#/\\#}"
              escaped_value="${escaped_value//&/\\&}"

              if grep -q "^${key}=" .env.production; then
                sed -i "s#^${key}=.*#${key}=${escaped_value}#" .env.production
              else
                printf '%s=%s\n' "$key" "$value" >> .env.production
              fi
            }

            wait_for_health() {
              container="$1"

              for attempt in {1..60}; do
                status="$(docker inspect --format='{{.State.Health.Status}}' "$container" 2>/dev/null || echo missing)"
                echo "$container health attempt $attempt/60: $status"

                if [ -z "$status" ] || [ "$status" = missing ]; then
                  echo "$container has no Docker healthcheck; cannot health-gate it."
                  docker logs --tail=200 "$container" || true
                  return 1
                fi

                if [ "$status" = healthy ]; then
                  return 0
                fi

                if [ "$status" = unhealthy ]; then
                  docker logs --tail=200 "$container" || true
                  return 1
                fi

                sleep 5
              done

              docker logs --tail=200 "$container" || true
              return 1
            }

            smoke_learning_os() {
              $COMPOSE run --rm -T --no-deps learning-os \
                php artisan rehearsal:smoke \
                --user-email="$SMOKE_USER_EMAIL" \
                --allow-production \
                --json < /dev/null
            }

            upsert_env LEARNING_OS_IMAGE_TAG "$IMAGE_TAG"
            upsert_env LEARNING_OS_DB "$TARGET_DB"
            upsert_env LEARNING_OS_API_URL "http://learning-os:8080"
            upsert_env LEARNING_OS_PROXY_USER_EMAIL "$SMOKE_USER_EMAIL"

            if ! grep -Eq '^LEARNING_OS_APP_KEY=base64:.+$' .env.production; then
              upsert_env LEARNING_OS_APP_KEY "base64:$(openssl rand -base64 32 | tr -d '\n')"
            fi

            echo "$DEPLOY_GITHUB_TOKEN" | docker login ghcr.io -u "$DEPLOY_GITHUB_ACTOR" --password-stdin
            timeout 600 $COMPOSE pull learning-os learning-os-worker
            $COMPOSE up -d postgres

            $COMPOSE run --rm -T --no-deps learning-os php artisan migrate --force < /dev/null

            proxy_token_output="$($COMPOSE run --rm -T --no-deps \
              -e CONVOLAB_PROXY_USER_EMAIL="$SMOKE_USER_EMAIL" \
              learning-os php artisan tinker --execute='
                $user = App\Models\User::query()->where("email", getenv("CONVOLAB_PROXY_USER_EMAIL"))->sole();
                $accessToken = $user->createToken("convolab-proxy", [
                  "study:read",
                  "study:write",
                  "feature-flags:read",
                  "feature-flags:write",
                ]);
                echo "PROXY_TOKEN_ID=".$accessToken->accessToken->getKey().PHP_EOL;
                echo "PROXY_TOKEN=".$accessToken->plainTextToken.PHP_EOL;
              ' < /dev/null)"
            NEW_PROXY_TOKEN_ID="$(printf '%s\n' "$proxy_token_output" \
              | sed -n 's/^PROXY_TOKEN_ID=//p' \
              | grep -E '^[0-9]+$' \
              | tail -1)"
            proxy_token="$(printf '%s\n' "$proxy_token_output" \
              | sed -n 's/^PROXY_TOKEN=//p' \
              | grep -E '^[0-9]+\|learning_os_[[:alnum:]]{40}[0-9a-f]{8}$' \
              | tail -1)"
            test -n "$NEW_PROXY_TOKEN_ID"
            test -n "$proxy_token"
            echo "::add-mask::$proxy_token"
            upsert_env LEARNING_OS_API_TOKEN "$proxy_token"

            desired_learning_os_image="ghcr.io/andyroo2000/learning-os:$IMAGE_TAG"

            ensure_learning_os_service() {
              service="$1"
              container="$2"
              current_image="$(docker inspect --format='{{.Config.Image}}' "$container" 2>/dev/null || true)"
              running="$(docker inspect --format='{{.State.Running}}' "$container" 2>/dev/null || true)"
              current_proxy_user_email="$(docker inspect \
                --format='{{range .Config.Env}}{{println .}}{{end}}' \
                "$container" 2>/dev/null \
                | sed -n 's/^CONVOLAB_PROXY_USER_EMAIL=//p' \
                | tail -1 || true)"
              current_config_revision="$(docker inspect \
                --format='{{range .Config.Env}}{{println .}}{{end}}' \
                "$container" 2>/dev/null \
                | sed -n 's/^LEARNING_OS_DEPLOY_CONFIG_REVISION=//p' \
                | tail -1 || true)"

              if [ "$current_image" = "$desired_learning_os_image" ] \
                && [ "$running" = true ] \
                && [ "$current_proxy_user_email" = "$SMOKE_USER_EMAIL" ] \
                && [ "$current_config_revision" = "static-media-v1" ]; then
                echo "Reusing running $container on immutable image $desired_learning_os_image."
                return
              fi

              $COMPOSE up -d --no-deps --force-recreate "$service"
            }

            ensure_learning_os_worker() {
              container="learning-os-worker"
              current_image="$(docker inspect --format='{{.Config.Image}}' "$container" 2>/dev/null || true)"
              running="$(docker inspect --format='{{.State.Running}}' "$container" 2>/dev/null || true)"
              current_command="$(docker inspect --format='{{join .Config.Cmd " "}}' "$container" 2>/dev/null || true)"
              current_config_revision="$(docker inspect \
                --format='{{range .Config.Env}}{{println .}}{{end}}' \
                "$container" 2>/dev/null \
                | sed -n 's/^LEARNING_OS_DEPLOY_CONFIG_REVISION=//p' \
                | tail -1 || true)"
              desired_queue_argument="--queue=study-imports,study-card-drafts,default"

              if [ "$current_image" = "$desired_learning_os_image" ] \
                && [ "$running" = true ] \
                && [ "$current_config_revision" = "static-media-v1" ] \
                && [[ " $current_command " == *" $desired_queue_argument "* ]]; then
                echo "Reusing running $container on immutable image $desired_learning_os_image."
                return
              fi

              if [ "$running" = true ]; then
                echo "Draining $container before replacing $current_image."
                DRAINING_WORKER_CONTAINER_ID="$(docker inspect --format='{{.Id}}' "$container")"
                docker update --restart=no "$container" >/dev/null

                if ! docker exec "$container" php artisan queue:restart; then
                  docker update --restart=unless-stopped "$container" >/dev/null || true
                  DRAINING_WORKER_CONTAINER_ID=""
                  return 1
                fi

                for ((attempt = 1; attempt <= WORKER_DRAIN_ATTEMPTS; attempt++)); do
                  running="$(docker inspect --format='{{.State.Running}}' "$container" 2>/dev/null || true)"

                  if [ "$running" != true ]; then
                    break
                  fi

                  echo "$container drain attempt $attempt/$WORKER_DRAIN_ATTEMPTS: waiting for the current job to finish."
                  sleep "$WORKER_DRAIN_INTERVAL_SECONDS"
                done

                if [ "$running" = true ]; then
                  echo "$container did not drain within $WORKER_DRAIN_TIMEOUT_MINUTES minutes."
                  docker update --restart=unless-stopped "$container" >/dev/null || true
                  DRAINING_WORKER_CONTAINER_ID=""
                  return 1
                fi
              fi

              $COMPOSE up -d --no-deps --force-recreate learning-os-worker
              DRAINING_WORKER_CONTAINER_ID=""
            }

            # Reconcile independently so an unchanged busy worker is not drained merely
            # because the ConvoLab proxy token rotated.
            ensure_learning_os_service learning-os learning-os-api
            ensure_learning_os_worker
            wait_for_health learning-os-api
            wait_for_health learning-os-worker

            docker exec -e API_TOKEN="$proxy_token" learning-os-api php -r '
              $context = stream_context_create(["http" => [
                  "header" => "Accept: application/json\r\nAuthorization: Bearer ".getenv("API_TOKEN")."\r\n",
                  "timeout" => 10,
              ]]);
              $body = file_get_contents("http://127.0.0.1:8080/api/study/settings", false, $context);
              if ($body === false || ! is_array(json_decode($body, true))) { exit(1); }

              $featureFlags = file_get_contents(
                "http://127.0.0.1:8080/api/feature-flags",
                false,
                $context,
              );
              if ($featureFlags === false || ! is_array(json_decode($featureFlags, true))) {
                exit(1);
              }

              $patchContext = stream_context_create(["http" => [
                  "method" => "PATCH",
                  "header" => "Accept: application/json\r\n".
                    "Content-Type: application/json\r\n".
                    "Authorization: Bearer ".getenv("API_TOKEN")."\r\n",
                  "content" => "{}",
                  "timeout" => 10,
              ]]);
              $updatedFeatureFlags = file_get_contents(
                "http://127.0.0.1:8080/api/feature-flags",
                false,
                $patchContext,
              );
              if (
                $updatedFeatureFlags === false
                || json_decode($updatedFeatureFlags, true) !== json_decode($featureFlags, true)
              ) {
                exit(1);
              }
            '

            active_color=blue
            if [ -s "$ACTIVE_COLOR_FILE" ]; then
              active_color="$(cat "$ACTIVE_COLOR_FILE")"
            fi
            case "$active_color" in
              blue|green) ;;
              *) echo "Invalid active production color: $active_color"; exit 1 ;;
            esac

            # Once replacement starts, retain the new token on failure because the
            # server may already be running with it. A later success prunes extras.
            PROXY_TOKEN_CUTOVER_STARTED=true
            $COMPOSE up -d --no-deps --force-recreate "server-$active_color"
            wait_for_health "convolab-server-$active_color"
            active_proxy_token="$(docker inspect \
              --format='{{range .Config.Env}}{{println .}}{{end}}' \
              "convolab-server-$active_color" \
              | sed -n 's/^LEARNING_OS_API_TOKEN=//p' \
              | tail -1)"
            test "$active_proxy_token" = "$proxy_token"
            active_static_media_proxy="$(docker inspect \
              --format='{{range .Config.Env}}{{println .}}{{end}}' \
              "convolab-server-$active_color" \
              | sed -n 's/^LEARNING_OS_STATIC_MEDIA_PROXY_ENABLED=//p' \
              | tail -1)"
            test "$active_static_media_proxy" = true

            if ! docker exec \
              -e CONVOLAB_PROXY_USER_EMAIL="$SMOKE_USER_EMAIL" \
              -e CONVOLAB_PROXY_TOKEN_ID="$NEW_PROXY_TOKEN_ID" \
              learning-os-api php artisan tinker --execute='
                $user = App\Models\User::query()
                  ->where("email", getenv("CONVOLAB_PROXY_USER_EMAIL"))
                  ->sole();
                $user->tokens()
                  ->where("name", "convolab-proxy")
                  ->where("id", "!=", getenv("CONVOLAB_PROXY_TOKEN_ID"))
                  ->delete();
              '; then
              echo "::warning::Unable to prune older Learning OS proxy tokens; a later deployment will retry."
            fi

            postgres_db="$(sed -n 's/^POSTGRES_DB=//p' .env.production | tail -1)"

            card_draft_smoke_id=
            media_smoke_id=
            media_smoke_body=
            media_smoke_headers=
            daily_audio_smoke_body=
            daily_audio_smoke_headers=

            cleanup_daily_audio_smoke() {
              [ -z "${daily_audio_smoke_body:-}" ] || rm -f "$daily_audio_smoke_body"
              [ -z "${daily_audio_smoke_headers:-}" ] || rm -f "$daily_audio_smoke_headers"
              daily_audio_smoke_body=
              daily_audio_smoke_headers=
            }

            cleanup_media_smoke() {
              [ -z "${media_smoke_body:-}" ] || rm -f "$media_smoke_body"
              [ -z "${media_smoke_headers:-}" ] || rm -f "$media_smoke_headers"
              media_smoke_body=
              media_smoke_headers=

              if [ -z "${media_smoke_id:-}" ]; then
                return
              fi

              docker exec -e MEDIA_SMOKE_ID="$media_smoke_id" \
                learning-os-api php artisan tinker --execute='
                  $media = App\Domain\Media\Models\MediaAsset::query()
                    ->whereKey(getenv("MEDIA_SMOKE_ID"))
                    ->first();
                  if ($media !== null) {
                    Illuminate\Support\Facades\Storage::disk("media")->delete($media->path);
                    $media->delete();
                  }
                ' > /dev/null || true
              media_smoke_id=
            }

            cleanup_deployment_failure() {
              exit_code=$?
              set +e

              if [ -n "${card_draft_smoke_id:-}" ] \
                && declare -F mutate_proxy_route > /dev/null; then
                mutate_proxy_route \
                  DELETE \
                  "/api/learning-os/study/card-drafts/$card_draft_smoke_id" \
                  '{}' > /dev/null || true
              fi
              cleanup_daily_audio_smoke
              cleanup_media_smoke
              cleanup_deployment_resources

              return "$exit_code"
            }

            trap cleanup_deployment_failure EXIT

            verify_study_api() {
              local postgres_user

              postgres_user="$(sed -n 's/^POSTGRES_USER=//p' .env.production | tail -1)"
              test -n "$postgres_user"

              user_record="$(printf '%s\n' \
                "SELECT id, role FROM \"User\" WHERE email = :'email' LIMIT 1;" \
                | docker exec -i convolab-postgres psql \
                  --username="$postgres_user" --dbname="$postgres_db" \
                  --tuples-only --no-align --field-separator='|' \
                  --set=email="$SMOKE_USER_EMAIL")"
              user_id="${user_record%%|*}"
              user_role="${user_record#*|}"
              test -n "$user_id"
              test "$user_role" != "$user_record"

              auth_token="$(docker exec \
                -e AUTH_USER_ID="$user_id" \
                -e AUTH_USER_ROLE="$user_role" \
                "convolab-server-$active_color" \
                node --input-type=module --eval='
                  import jwt from "jsonwebtoken";
                  process.stdout.write(jwt.sign(
                    { userId: process.env.AUTH_USER_ID, role: process.env.AUTH_USER_ROLE },
                    process.env.JWT_SECRET,
                    { expiresIn: "5m" },
                  ));
                ')"
              test -n "$auth_token"
              echo "::add-mask::$auth_token"

              fetch_read_route() {
                local label="$1"
                local path="$2"
                local response=""
                local attempt

                for attempt in {1..12}; do
                  if response="$(curl --fail --silent --show-error \
                    --header 'Accept: application/json' \
                    --cookie "token=$auth_token" \
                    "https://convo-lab.com$path")"; then
                    printf '%s' "$response"
                    return 0
                  fi
                  echo "$label attempt $attempt/12 failed; retrying." >&2
                  sleep 3
                done

                return 1
              }

              stream_json_pair() {
                # Stream newline-delimited base64 so large responses do not exceed exec ARG_MAX.
                printf '%s' "$1" | base64 | tr -d '\n'
                printf '\n'
                printf '%s' "$2" | base64 | tr -d '\n'
                printf '\n'
              }

              assert_json_equal() {
                local label="$1"
                local expected="$2"
                local actual="$3"

                stream_json_pair "$expected" "$actual" | docker exec -i \
                  "convolab-server-$active_color" \
                  node --input-type=module --eval='
                    import assert from "node:assert/strict";
                    process.stdin.setEncoding("utf8");
                    let input = "";
                    for await (const chunk of process.stdin) input += chunk;
                    const fields = input.trimEnd().split("\n");
                    if (fields.length !== 2) {
                      console.error("Expected exactly two framed mutation responses.");
                      process.exit(1);
                    }
                    const [expectedEncoded, actualEncoded] = fields;
                    let expectedResponse;
                    let actualResponse;
                    try {
                      expectedResponse = JSON.parse(Buffer.from(expectedEncoded, "base64"));
                      actualResponse = JSON.parse(Buffer.from(actualEncoded, "base64"));
                    } catch {
                      console.error("Expected or actual mutation response is not valid JSON.");
                      process.exit(1);
                    }
                    const differingPaths = (actualValue, expectedValue, path = "$") => {
                      if (Object.is(actualValue, expectedValue)) return [];
                      if (
                        actualValue === null || expectedValue === null ||
                        typeof actualValue !== "object" || typeof expectedValue !== "object" ||
                        Array.isArray(actualValue) !== Array.isArray(expectedValue)
                      ) return [path];
                      if (
                        Array.isArray(actualValue) && actualValue.length !== expectedValue.length
                      ) return [`${path}.length`];
                      const keys = new Set([
                        ...Object.keys(actualValue),
                        ...Object.keys(expectedValue),
                      ]);
                      return [...keys].flatMap((key) =>
                        key in actualValue && key in expectedValue
                          ? differingPaths(
                              actualValue[key],
                              expectedValue[key],
                              `${path}.${key}`,
                            )
                          : [`${path}.${key}`]
                      );
                    };
                    try {
                      assert.deepStrictEqual(actualResponse, expectedResponse);
                    } catch {
                      console.error("Mutation changed the stable response contract.");
                      const paths = differingPaths(actualResponse, expectedResponse);
                      console.error(`Differing JSON paths: ${paths.slice(0, 50).join(", ")}`);
                      process.exit(1);
                    }
                  '
                echo "$label idempotent write smoke check passed."
              }

              assert_queue_order_equal() {
                local expected="$1"
                local actual="$2"

                stream_json_pair "$expected" "$actual" | docker exec -i \
                  "convolab-server-$active_color" \
                  node --input-type=module --eval='
                    import assert from "node:assert/strict";
                    process.stdin.setEncoding("utf8");
                    let input = "";
                    for await (const chunk of process.stdin) input += chunk;
                    const fields = input.trimEnd().split("\n");
                    if (fields.length !== 2) {
                      console.error("Expected exactly two framed New Queue responses.");
                      process.exit(1);
                    }
                    const responses = fields.map((field) =>
                      JSON.parse(Buffer.from(field, "base64"))
                    );
                    const ids = (response) => {
                      if (!Array.isArray(response.items)) {
                        throw new TypeError("New Queue response has no items array.");
                      }
                      return response.items.map(({ id }) => id);
                    };
                    try {
                      assert.deepStrictEqual(ids(responses[1]), ids(responses[0]));
                    } catch (error) {
                      console.error(
                        error instanceof TypeError
                          ? error.message
                          : "New Queue reorder changed card membership or order."
                      );
                      process.exit(1);
                    }
                  '
                echo "New Queue reorder preserved card membership and order."
              }

              validate_session_response() {
                local response="$1"

                printf '%s' "$response" | docker exec -i \
                  "convolab-server-$active_color" \
                  node --input-type=module --eval='
                    process.stdin.setEncoding("utf8");
                    let input = "";
                    for await (const chunk of process.stdin) input += chunk;
                    const response = JSON.parse(input);
                    if (!Array.isArray(response.cards)) {
                      console.error("Learning OS session response has no cards array.");
                      process.exit(1);
                    }
                    if (response.overview === null || typeof response.overview !== "object") {
                      console.error("Learning OS session response has no overview object.");
                      process.exit(1);
                    }
                  '
                echo "Study session Learning OS smoke check passed."
              }

              mutate_proxy_route() {
                local method="$1"
                local path="$2"
                local body="$3"
                local response_file
                local status

                response_file="$(mktemp)"
                status="$(curl --silent --show-error \
                  --output "$response_file" \
                  --write-out '%{http_code}' \
                  --request "$method" \
                  --header 'Accept: application/json' \
                  --header 'Content-Type: application/json' \
                  --header 'Origin: https://convo-lab.com' \
                  --header "X-CSRF-Token: $csrf_token" \
                  --header "Cookie: token=$auth_token; XSRF-TOKEN=$csrf_cookie_raw" \
                  --data "$body" \
                  "https://convo-lab.com$path")"

                if [[ ! "$status" =~ ^2[0-9][0-9]$ ]]; then
                  echo "$method $path failed with HTTP $status:" >&2
                  cat "$response_file" >&2
                  echo >&2
                  rm -f "$response_file"
                  return 1
                fi

                cat "$response_file"
                rm -f "$response_file"
              }

              fetch_read_route \
                'Overview Learning OS' \
                '/api/learning-os/study/overview?timeZone=America%2FNew_York' \
                > /dev/null

              daily_audio_list="$(
                fetch_read_route \
                  'Daily Audio practice lookup' \
                  '/api/learning-os/study/daily-audio-practice'
              )"
              daily_audio_id="$(printf '%s' "$daily_audio_list" | docker exec -i \
                "convolab-server-$active_color" node --input-type=module --eval='
                  const chunks = [];
                  for await (const chunk of process.stdin) chunks.push(chunk);
                  const practices = JSON.parse(Buffer.concat(chunks).toString("utf8"));
                  if (!Array.isArray(practices)) process.exit(1);
                  const practice = practices.find((value) =>
                    Array.isArray(value?.tracks) &&
                    value.tracks.some((track) =>
                      track?.status === "ready" && typeof track.audioUrl === "string"
                    )
                  );
                  const id = practice?.id;
                  if (id === undefined) process.exit(0);
                  if (
                    typeof id !== "string" ||
                    !/^[0-9a-f]{8}-[0-9a-f]{4}-[1-8][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(id)
                  ) process.exit(1);
                  process.stdout.write(id);
                ')"

              if [ -z "$daily_audio_id" ]; then
                echo "No historical ready Daily Audio practice is available for streaming verification." >&2
                exit 1
              fi

              daily_audio_detail="$(
                fetch_read_route \
                  'Daily Audio historical track lookup' \
                  "/api/learning-os/study/daily-audio-practice/$daily_audio_id"
              )"
              daily_audio_track_url="$(printf '%s' "$daily_audio_detail" | docker exec -i \
                "convolab-server-$active_color" node --input-type=module --eval='
                  const chunks = [];
                  for await (const chunk of process.stdin) chunks.push(chunk);
                  const practice = JSON.parse(Buffer.concat(chunks).toString("utf8"));
                  const track = practice?.tracks?.find((value) =>
                    value?.status === "ready" && typeof value.audioUrl === "string"
                  );
                  const path = track?.audioUrl;
                  if (
                    typeof path !== "string" ||
                    !/^\/api\/learning-os\/study\/daily-audio-practice\/[0-9a-f]{8}-[0-9a-f]{4}-[1-8][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}\/tracks\/[0-9a-f]{8}-[0-9a-f]{4}-[1-8][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}\/audio$/.test(path)
                  ) process.exit(1);
                  process.stdout.write(path);
                ')"
              daily_audio_smoke_body="$(mktemp)"
              daily_audio_smoke_headers="$(mktemp)"
              curl --fail --silent --show-error \
                --dump-header "$daily_audio_smoke_headers" \
                --output "$daily_audio_smoke_body" \
                --cookie "token=$auth_token" \
                "https://convo-lab.com$daily_audio_track_url"
              test -s "$daily_audio_smoke_body"
              grep -Eiq '^content-type: audio/mpeg([[:space:]]|$)' "$daily_audio_smoke_headers"
              grep -Eiq "^content-security-policy: sandbox; default-src 'none'[[:space:]]*$" "$daily_audio_smoke_headers"
              grep -Eiq '^cross-origin-resource-policy: same-origin[[:space:]]*$' "$daily_audio_smoke_headers"
              grep -Eiq '^x-content-type-options: nosniff[[:space:]]*$' "$daily_audio_smoke_headers"
              cleanup_daily_audio_smoke
              echo "Historical Daily Audio streaming smoke check passed."

              daily_audio_status="$(
                fetch_read_route \
                  'Daily Audio status Learning OS' \
                  "/api/learning-os/study/daily-audio-practice/$daily_audio_id/status"
              )"
              printf '%s' "$daily_audio_status" | docker exec -i \
                "convolab-server-$active_color" node --input-type=module --eval='
                  const chunks = [];
                  for await (const chunk of process.stdin) chunks.push(chunk);
                  const response = JSON.parse(Buffer.concat(chunks).toString("utf8"));
                  const statuses = new Set(["draft", "generating", "ready", "error"]);
                  if (
                    typeof response?.id !== "string" ||
                    !statuses.has(response.status) ||
                    !(response.progress === null || Number.isInteger(response.progress)) ||
                    !Array.isArray(response.tracks)
                  ) process.exit(1);
                '
              echo "Daily Audio Learning OS read smoke checks passed."
              fetch_read_route \
                'Browser Learning OS' \
                '/api/learning-os/study/browser?sortField=created_on&sortDirection=desc&limit=25' \
                > /dev/null
              echo "Browser Learning OS independent-state smoke check passed."

              browser_list="$(fetch_read_route \
                'Browser detail note lookup' \
                '/api/learning-os/study/browser?sortField=created_on&sortDirection=desc&limit=1')"
              browser_note_id="$(docker exec -e BROWSER_RESPONSE="$browser_list" \
                "convolab-server-$active_color" node --input-type=module --eval='
                  const r=JSON.parse(process.env.BROWSER_RESPONSE),n=r?.rows?.[0]?.noteId;
                  if(typeof n!=="string"||!/^[A-Za-z0-9-]+$/.test(n))process.exit(1);
                  process.stdout.write(n);
                ')"
              test -n "$browser_note_id"
              fetch_read_route \
                'Browser detail Learning OS' \
                "/api/learning-os/study/browser/$browser_note_id" \
                > /dev/null
              echo "Browser detail Learning OS independent-state smoke check passed."

              csrf_cookie_jar="$(mktemp)"
              curl --fail --silent --show-error \
                --cookie "token=$auth_token" \
                --cookie-jar "$csrf_cookie_jar" \
                --header 'Origin: https://convo-lab.com' \
                'https://convo-lab.com/api/auth/csrf' > /dev/null
              csrf_cookie_raw="$(awk '$6 == "XSRF-TOKEN" { value = $7 } END { print value }' "$csrf_cookie_jar")"
              rm -f "$csrf_cookie_jar"
              test -n "$csrf_cookie_raw"
              csrf_token="$(docker exec \
                -e RAW_CSRF_TOKEN="$csrf_cookie_raw" \
                "convolab-server-$active_color" \
                node --input-type=module --eval='process.stdout.write(decodeURIComponent(process.env.RAW_CSRF_TOKEN))')"
              test -n "$csrf_token"

              gcs_bucket="$(sed -n 's/^GCS_BUCKET_NAME=//p' .env.production | tail -1)"
              test -n "$gcs_bucket"
              avatar_headers="$(mktemp)"
              avatar_status="$(curl --silent --show-error \
                --dump-header "$avatar_headers" \
                --output /dev/null \
                --write-out '%{http_code}' \
                'https://convo-lab.com/api/avatars/voices/ja-shohei.jpg')"
              test "$avatar_status" = 302
              avatar_location="$(sed -n 's/^[Ll]ocation: //p' "$avatar_headers" | tr -d '\r' | tail -1)"
              case "$avatar_location" in
                "https://storage.googleapis.com/$gcs_bucket/avatars/voices/ja-shohei.jpg?"*) ;;
                *) exit 1 ;;
              esac
              grep -Eiq '^cache-control: .*private' "$avatar_headers"
              rm -f "$avatar_headers"
              echo "Avatar Learning OS proxy smoke check passed."

              tool_audio_body='{"paths":["/tools-audio/japanese-time/google-kento-professional/time/minute/44.mp3"]}'
              tool_audio_response="$(mutate_proxy_route \
                POST \
                '/api/tools-audio/signed-urls' \
                "$tool_audio_body")"
              docker exec \
                -e TOOL_AUDIO_RESPONSE="$tool_audio_response" \
                -e GCS_BUCKET="$gcs_bucket" \
                "convolab-server-$active_color" \
                node --input-type=module --eval='
                  const response = JSON.parse(process.env.TOOL_AUDIO_RESPONSE);
                  const path = "/tools-audio/japanese-time/google-kento-professional/time/minute/44.mp3";
                  if (
                    response?.mode !== "signed"
                    || !Number.isInteger(response?.ttlSeconds)
                    || response.ttlSeconds < 300
                    || response.ttlSeconds > 86400
                    || typeof response?.urls?.[path]?.expiresAt !== "string"
                    || !response?.urls?.[path]?.url?.startsWith(
                      `https://storage.googleapis.com/${process.env.GCS_BUCKET}/tools-audio/`
                    )
                  ) process.exit(1);
                '
              echo "Tool Audio Learning OS proxy smoke check passed."

              session_body='{"timeZone":"America/New_York"}'
              proxy_session="$(mutate_proxy_route POST '/api/learning-os/study/session/start' "$session_body")"
              validate_session_response "$proxy_session"

              settings_before="$(fetch_read_route 'Settings write baseline' '/api/learning-os/study/settings')"
              settings_body="$(docker exec \
                -e SETTINGS_RESPONSE="$settings_before" \
                "convolab-server-$active_color" \
                node --input-type=module --eval='
                  const settings = JSON.parse(process.env.SETTINGS_RESPONSE);
                  process.stdout.write(JSON.stringify({ newCardsPerDay: settings.newCardsPerDay }));
                ')"
              settings_after="$(mutate_proxy_route PATCH '/api/learning-os/study/settings' "$settings_body")"
              assert_json_equal Settings "$settings_before" "$settings_after"

              queue_before="$(fetch_read_route 'New Queue write baseline' '/api/learning-os/study/new-queue?limit=100')"
              queue_body="$(docker exec \
                -e QUEUE_RESPONSE="$queue_before" \
                "convolab-server-$active_color" \
                node --input-type=module --eval='
                  const queue = JSON.parse(process.env.QUEUE_RESPONSE);
                  if (!Array.isArray(queue.items) || queue.items.length < 1) process.exit(1);
                  process.stdout.write(JSON.stringify({ cardIds: queue.items.map(({ id }) => id) }));
                ')"
              queue_after="$(mutate_proxy_route POST '/api/learning-os/study/new-queue/reorder' "$queue_body")"
              assert_queue_order_equal "$queue_before" "$queue_after"
              queue_stable="$(mutate_proxy_route POST '/api/learning-os/study/new-queue/reorder' "$queue_body")"
              assert_json_equal 'New Queue' "$queue_after" "$queue_stable"

              draft_body='{"creationKind":"text-recognition","cardType":"recognition","prompt":{"cueText":"Learning OS draft smoke"},"answer":{"meaning":"temporary deployment check"},"imagePlacement":"none","imagePrompt":null}'
              draft_response="$(mutate_proxy_route POST '/api/learning-os/study/card-drafts' "$draft_body")"
              draft_id="$(docker exec -e DRAFT_RESPONSE="$draft_response" \
                "convolab-server-$active_color" node --input-type=module --eval='
                  const draft = JSON.parse(process.env.DRAFT_RESPONSE);
                  if (typeof draft.id !== "string" || !/^[0-9A-HJKMNP-TV-Z]{26}$/i.test(draft.id)) {
                    process.exit(1);
                  }
                  process.stdout.write(draft.id);
                ')"
              test -n "$draft_id"
              card_draft_smoke_id="$draft_id"

              for attempt in {1..12}; do
                draft_list="$(fetch_read_route \
                  'Card draft list' \
                  '/api/learning-os/study/card-drafts?limit=200')"
                draft_status="$(docker exec \
                  -e DRAFT_RESPONSE="$draft_list" \
                  -e DRAFT_ID="$draft_id" \
                  "convolab-server-$active_color" node --input-type=module --eval='
                    const response = JSON.parse(process.env.DRAFT_RESPONSE);
                    const draft = response.drafts?.find(({ id }) => id === process.env.DRAFT_ID);
                    process.stdout.write(typeof draft?.status === "string" ? draft.status : "");
                  ')"
                if [ "$draft_status" = ready ] || [ "$draft_status" = error ]; then
                  break
                fi
                echo "Card draft processing attempt $attempt/12: ${draft_status:-missing}"
                sleep 2
              done
              if [ "$draft_status" != ready ] && [ "$draft_status" != error ]; then
                echo "Card draft did not reach an editable state."
                exit 1
              fi

              draft_update='{"prompt":{"cueText":"Learning OS draft smoke"},"answer":{"meaning":"updated temporary deployment check"},"imagePlacement":"none","imagePrompt":null,"previewAudio":null,"previewAudioRole":null,"previewImage":null}'
              mutate_proxy_route \
                PATCH \
                "/api/learning-os/study/card-drafts/$draft_id" \
                "$draft_update" > /dev/null
              mutate_proxy_route \
                DELETE \
                "/api/learning-os/study/card-drafts/$draft_id" \
                '{}' > /dev/null
              card_draft_smoke_id=
              echo "Study card draft lifecycle smoke check passed."

              media_smoke_output="$(docker exec \
                -e CONVOLAB_PROXY_USER_EMAIL="$SMOKE_USER_EMAIL" \
                learning-os-api php artisan tinker --execute='
                  $user = App\Models\User::query()
                    ->where("email", getenv("CONVOLAB_PROXY_USER_EMAIL"))
                    ->sole();
                  $contents = "learning-os-media-smoke";
                  $path = "deployment-smoke/".Illuminate\Support\Str::ulid().".bin";
                  $disk = Illuminate\Support\Facades\Storage::disk("media");
                  try {
                    if (! $disk->put($path, $contents)) {
                      throw new RuntimeException("Unable to write the media smoke file.");
                    }
                    $media = App\Domain\Media\Models\MediaAsset::query()->create([
                      "user_id" => $user->getKey(),
                      "disk" => "media",
                      "path" => $path,
                      "mime_type" => "application/octet-stream",
                      "size_bytes" => strlen($contents),
                      "checksum_sha256" => hash("sha256", $contents),
                      "original_filename" => "learning-os-media-smoke.bin",
                    ]);
                  } catch (Throwable $error) {
                    $disk->delete($path);
                    throw $error;
                  }
                  echo "MEDIA_SMOKE_ID=".$media->getKey().PHP_EOL;
                ')"
              media_smoke_id="$(printf '%s\n' "$media_smoke_output" \
                | sed -n 's/^MEDIA_SMOKE_ID=//p' \
                | tail -1)"
              if ! [[ "$media_smoke_id" =~ ^[0-9a-hjkmnp-tv-z]{26}$ ]]; then
                echo "Learning OS returned an invalid media smoke ULID: ${media_smoke_id:-<empty>}" >&2
                exit 1
              fi

              media_smoke_body="$(mktemp)"
              media_smoke_headers="$(mktemp)"
              curl --fail --silent --show-error \
                --dump-header "$media_smoke_headers" \
                --output "$media_smoke_body" \
                --cookie "token=$auth_token" \
                "https://convo-lab.com/api/learning-os/study/media/$media_smoke_id"
              test "$(cat "$media_smoke_body")" = "learning-os-media-smoke"
              grep -Eiq '^content-type: application/octet-stream([[:space:]]|$)' "$media_smoke_headers"
              grep -Eiq "^content-security-policy: sandbox; default-src 'none'[[:space:]]*$" "$media_smoke_headers"
              grep -Eiq '^cross-origin-resource-policy: same-origin[[:space:]]*$' "$media_smoke_headers"
              grep -Eiq '^x-content-type-options: nosniff[[:space:]]*$' "$media_smoke_headers"
              cleanup_media_smoke
              echo "Study media streaming smoke check passed."

              ACTIVE_COLOR="$active_color" \
                ORIGINAL_PROXY_EMAIL="$SMOKE_USER_EMAIL" \
                ORIGINAL_PROXY_TOKEN="$proxy_token" \
                bash .github/scripts/smoke-study-import-lifecycle.sh
            }

            verify_study_api
            trap - EXIT

            $COMPOSE ps learning-os learning-os-worker "server-$active_color"
            echo "Learning OS production deployment completed."
          ENDSSH

          grep -Fqx 'Learning OS production deployment completed.' "$deployment_log"
          rm -f "$deployment_log"
          trap - EXIT

      - name: Verify ConvoLab health
        run: curl --fail --silent --show-error https://convo-lab.com/health > /dev/null
