            cleanup_course_write_smoke() {
              local mode="${1:-strict}"
              local cleanup_output
              local remaining_count

              if [ -z "${course_write_smoke_marker:-}" ]; then
                return
              fi

              if ! cleanup_output="$(docker exec \
                -e CONVOLAB_PROXY_USER_EMAIL="$SMOKE_USER_EMAIL" \
                -e CONVOLAB_SMOKE_USER_ID="$user_id" \
                -e COURSE_WRITE_SMOKE_ID="${course_write_smoke_id:-}" \
                -e COURSE_WRITE_SMOKE_MARKER="$course_write_smoke_marker" \
                learning-os-api php artisan tinker --execute='
                  $user = App\Models\User::query()
                    ->where("email", getenv("CONVOLAB_PROXY_USER_EMAIL"))
                    ->sole();
                  $sourceUserId = getenv("CONVOLAB_SMOKE_USER_ID");
                  $courseId = getenv("COURSE_WRITE_SMOKE_ID");
                  $initialTitle = "Learning OS course write smoke ".getenv("COURSE_WRITE_SMOKE_MARKER");
                  $updatedTitle = "Learning OS course write smoke updated ".getenv("COURSE_WRITE_SMOKE_MARKER");

                  Illuminate\Support\Facades\DB::transaction(function () use (
                    $user,
                    $sourceUserId,
                    $courseId,
                    $initialTitle,
                    $updatedTitle,
                  ): void {
                    $courseIds = App\Domain\Content\Models\ContentCourse::query()
                      ->where("user_id", $user->getKey())
                      ->where("convolab_user_id", $sourceUserId)
                      ->where(function ($query) use ($courseId, $initialTitle, $updatedTitle): void {
                        $query->whereIn("title", [$initialTitle, $updatedTitle]);
                        if ($courseId !== "") {
                          $query->orWhere("id", $courseId);
                        }
                      })
                      ->pluck("id")
                      ->all();
                    if ($courseId !== "") {
                      $courseIds = array_merge(
                        $courseIds,
                        App\Domain\Content\Models\ContentCourseTombstone::query()
                          ->where("user_id", $user->getKey())
                          ->where("convolab_user_id", $sourceUserId)
                          ->where("course_id", $courseId)
                          ->pluck("course_id")
                          ->all(),
                      );
                    }
                    $courseIds = array_values(array_unique($courseIds));

                    $episodeIds = App\Domain\Content\Models\ContentEpisode::query()
                      ->where("user_id", $user->getKey())
                      ->where("convolab_user_id", $sourceUserId)
                      ->where("source_system", App\Domain\Content\Support\ContentSourceSystem::LEARNING_OS)
                      ->where("title", $initialTitle)
                      ->pluck("id")
                      ->all();

                    if ($courseIds !== [] || $episodeIds !== []) {
                      App\Domain\Content\Models\ContentEpisodeCourse::query()
                        ->where(function ($query) use ($courseIds, $episodeIds): void {
                          if ($courseIds !== []) {
                            $query->whereIn("convolab_course_id", $courseIds);
                          }
                          if ($episodeIds !== []) {
                            $method = $courseIds === [] ? "whereIn" : "orWhereIn";
                            $query->{$method}("episode_id", $episodeIds);
                          }
                        })
                        ->delete();
                    }
                    if ($courseIds !== []) {
                      App\Domain\Content\Models\ContentCourse::query()
                        ->whereIn("id", $courseIds)
                        ->delete();
                      App\Domain\Content\Models\ContentCourseTombstone::query()
                        ->whereIn("course_id", $courseIds)
                        ->delete();
                    }
                    if ($episodeIds !== []) {
                      App\Domain\Content\Models\ContentEpisode::query()
                        ->whereIn("id", $episodeIds)
                        ->delete();
                    }
                  });

                  $remaining = App\Domain\Content\Models\ContentCourse::query()
                    ->where("user_id", $user->getKey())
                    ->where("convolab_user_id", $sourceUserId)
                    ->whereIn("title", [$initialTitle, $updatedTitle])
                    ->count();
                  if ($courseId !== "") {
                    $remaining += App\Domain\Content\Models\ContentCourseTombstone::query()
                      ->where("course_id", $courseId)
                      ->count();
                  }
                  $remaining += App\Domain\Content\Models\ContentEpisode::query()
                    ->where("user_id", $user->getKey())
                    ->where("convolab_user_id", $sourceUserId)
                    ->where("source_system", App\Domain\Content\Support\ContentSourceSystem::LEARNING_OS)
                    ->where("title", $initialTitle)
                    ->count();
                  echo "COURSE_WRITE_SMOKE_REMAINING=".$remaining.PHP_EOL;
                ')"; then
                if [ "$mode" = best-effort ]; then
                  echo "::warning::Unable to clean up course-write smoke fixture $course_write_smoke_marker."
                  return 0
                fi
                return 1
              fi

              remaining_count="$(printf '%s\n' "$cleanup_output" \
                | sed -n 's/^COURSE_WRITE_SMOKE_REMAINING=//p' \
                | tail -1)"
              if [ "$remaining_count" = 0 ]; then
                course_write_smoke_id=
                course_write_smoke_marker=
                return 0
              fi

              if [ "$mode" = best-effort ]; then
                echo "::warning::Course-write smoke cleanup left ${remaining_count:-an unknown number of} rows for fixture $course_write_smoke_marker."
                return 0
              fi

              echo "Course-write smoke fixture was not fully removed." >&2
              return 1
            }

            cleanup_episode_write_smoke() {
              local mode="${1:-strict}"
              local cleanup_output
              local remaining_count

              if [ -z "${episode_write_smoke_marker:-}" ]; then
                return
              fi

              if ! cleanup_output="$(docker exec \
                -e CONVOLAB_PROXY_USER_EMAIL="$SMOKE_USER_EMAIL" \
                -e CONVOLAB_SMOKE_USER_ID="$user_id" \
                -e EPISODE_WRITE_SMOKE_ID="${episode_write_smoke_id:-}" \
                -e EPISODE_WRITE_SMOKE_MARKER="$episode_write_smoke_marker" \
                learning-os-api php artisan tinker --execute='
                  $user = App\Models\User::query()
                    ->where("email", getenv("CONVOLAB_PROXY_USER_EMAIL"))
                    ->sole();
                  $sourceUserId = getenv("CONVOLAB_SMOKE_USER_ID");
                  $episodeId = getenv("EPISODE_WRITE_SMOKE_ID");
                  $initialTitle = "Learning OS episode write smoke ".getenv("EPISODE_WRITE_SMOKE_MARKER");
                  $updatedTitle = "Learning OS episode write smoke updated ".getenv("EPISODE_WRITE_SMOKE_MARKER");

                  $query = App\Domain\Content\Models\ContentEpisode::query()
                    ->where("user_id", $user->getKey())
                    ->where("convolab_user_id", $sourceUserId)
                    ->where(function ($query) use ($episodeId, $initialTitle, $updatedTitle): void {
                      $query->whereIn("title", [$initialTitle, $updatedTitle]);
                      if ($episodeId !== "") {
                        $query->orWhere("id", $episodeId);
                      }
                    });
                  $query->delete();

                  $remaining = App\Domain\Content\Models\ContentEpisode::query()
                    ->where("user_id", $user->getKey())
                    ->where("convolab_user_id", $sourceUserId)
                    ->where(function ($query) use ($episodeId, $initialTitle, $updatedTitle): void {
                      $query->whereIn("title", [$initialTitle, $updatedTitle]);
                      if ($episodeId !== "") {
                        $query->orWhere("id", $episodeId);
                      }
                    })
                    ->count();
                  echo "EPISODE_WRITE_SMOKE_REMAINING=".$remaining.PHP_EOL;
                ')"; then
                if [ "$mode" = best-effort ]; then
                  echo "::warning::Unable to clean up episode-write smoke fixture $episode_write_smoke_marker."
                  return 0
                fi
                return 1
              fi

              remaining_count="$(printf '%s\n' "$cleanup_output" \
                | sed -n 's/^EPISODE_WRITE_SMOKE_REMAINING=//p' \
                | tail -1)"
              if [ "$remaining_count" = 0 ]; then
                episode_write_smoke_id=
                episode_write_smoke_marker=
                return 0
              fi

              if [ "$mode" = best-effort ]; then
                echo "::warning::Episode-write smoke cleanup left ${remaining_count:-an unknown number of} rows for fixture $episode_write_smoke_marker."
                return 0
              fi

              echo "Episode-write smoke fixture was not fully removed." >&2
              return 1
            }

            cleanup_deployment_failure() {
              exit_code=$?
              set +e

              if [ -n "${card_draft_smoke_id:-}" ] \
                && declare -F mutate_proxy_route > /dev/null; then
                mutate_proxy_route \
                  DELETE \
                  "/api/learning-os/study/card-drafts/$card_draft_smoke_id" \
                  '{}' > /dev/null || true
              fi
              cleanup_daily_audio_smoke
              cleanup_episode_write_smoke best-effort
              cleanup_course_write_smoke best-effort
              cleanup_course_generation_smoke best-effort
              cleanup_dialogue_generation_smoke best-effort
              cleanup_image_generation_smoke best-effort
              cleanup_audio_generation_smoke best-effort
              cleanup_script_smoke best-effort
              cleanup_media_smoke
              cleanup_deployment_resources

              return "$exit_code"
            }

            trap cleanup_deployment_failure EXIT

            verify_study_api() {
              local postgres_user

              postgres_user="$(sed -n 's/^POSTGRES_USER=//p' .env.production | tail -1)"
              test -n "$postgres_user"

              user_record="$(printf '%s\n' \
                "SELECT id, role FROM \"User\" WHERE email = :'email' LIMIT 1;" \
                | docker exec -i convolab-postgres psql \
                  --username="$postgres_user" --dbname="$postgres_db" \
                  --tuples-only --no-align --field-separator='|' \
                  --set=email="$SMOKE_USER_EMAIL")"
              user_id="${user_record%%|*}"
              user_role="${user_record#*|}"
              test -n "$user_id"
              test "$user_role" != "$user_record"

              auth_token="$(docker exec \
                -e AUTH_USER_ID="$user_id" \
                -e AUTH_USER_ROLE="$user_role" \
                "convolab-server-$active_color" \
                node --input-type=module --eval='
                  import jwt from "jsonwebtoken";
                  process.stdout.write(jwt.sign(
                    { userId: process.env.AUTH_USER_ID, role: process.env.AUTH_USER_ROLE },
                    process.env.JWT_SECRET,
                    { expiresIn: "5m" },
                  ));
                ')"
              test -n "$auth_token"
              echo "::add-mask::$auth_token"

              csrf_cookie_jar="$(mktemp)"
              curl --fail --silent --show-error \
                --cookie "token=$auth_token" \
                --cookie-jar "$csrf_cookie_jar" \
                --header 'Origin: https://convo-lab.com' \
                'https://convo-lab.com/api/auth/csrf' > /dev/null
              csrf_cookie_raw="$(awk '$6 == "XSRF-TOKEN" { value = $7 } END { print value }' "$csrf_cookie_jar")"
              rm -f "$csrf_cookie_jar"
              test -n "$csrf_cookie_raw"
              csrf_token="$(docker exec \
                -e RAW_CSRF_TOKEN="$csrf_cookie_raw" \
                "convolab-server-$active_color" \
                node --input-type=module --eval='process.stdout.write(decodeURIComponent(process.env.RAW_CSRF_TOKEN))')"
              test -n "$csrf_token"

              fetch_read_route() {
                local label="$1"
                local path="$2"
                local response=""
                local response_file
                local status
                local attempt

                for attempt in {1..12}; do
                  response_file="$(mktemp)"
                  if status="$(curl --silent --show-error \
                      --output "$response_file" \
                      --write-out '%{http_code}' \
                      --header 'Accept: application/json' \
                      --cookie "token=$auth_token" \
                      "https://convo-lab.com$path")"; then
                    :
                  else
                    status="${status:-transport-error}"
                  fi
                  response="$(cat "$response_file")"
                  rm -f "$response_file"
                  if [[ "$status" =~ ^2[0-9][0-9]$ ]]; then
                    printf '%s' "$response"
                    return 0
                  fi
                  echo "$label attempt $attempt/12 returned HTTP ${status:-unknown}; retrying." >&2
                  printf '%s\n' "${response:0:2048}" >&2
                  sleep 3
                done

                return 1
              }

              auth_me="$(fetch_read_route 'Auth current user Learning OS' '/api/auth/me')"
              printf '%s' "$auth_me" | docker exec \
                -i \
                -e EXPECTED_USER_ID="$user_id" \
                -e EXPECTED_USER_EMAIL="$SMOKE_USER_EMAIL" \
                -e EXPECTED_USER_ROLE="$user_role" \
                "convolab-server-$active_color" \
                node --input-type=module --eval='
                  let body = "";
                  for await (const chunk of process.stdin) body += chunk;
                  const account = JSON.parse(body);
                  if (
                    account.id !== process.env.EXPECTED_USER_ID
                    || account.email.toLowerCase() !== process.env.EXPECTED_USER_EMAIL.toLowerCase()
                    || account.role !== process.env.EXPECTED_USER_ROLE
                    || typeof account.seenSampleContentGuide !== "boolean"
                    || typeof account.seenCustomContentGuide !== "boolean"
                  ) process.exit(1);
                '
              echo "Auth current-user Learning OS proxy smoke check passed."

              stream_json_pair() {
                # Stream newline-delimited base64 so large responses do not exceed exec ARG_MAX.
                printf '%s' "$1" | base64 | tr -d '\n'
                printf '\n'
                printf '%s' "$2" | base64 | tr -d '\n'
                printf '\n'
              }

              assert_json_equal() {
                local label="$1"
                local expected="$2"
                local actual="$3"

                stream_json_pair "$expected" "$actual" | docker exec -i \
                  "convolab-server-$active_color" \
                  node --input-type=module --eval='
                    import assert from "node:assert/strict";
                    process.stdin.setEncoding("utf8");
                    let input = "";
                    for await (const chunk of process.stdin) input += chunk;
                    const fields = input.trimEnd().split("\n");
                    if (fields.length !== 2) {
                      console.error("Expected exactly two framed mutation responses.");
                      process.exit(1);
                    }
                    const [expectedEncoded, actualEncoded] = fields;
                    let expectedResponse;
                    let actualResponse;
                    try {
                      expectedResponse = JSON.parse(Buffer.from(expectedEncoded, "base64"));
                      actualResponse = JSON.parse(Buffer.from(actualEncoded, "base64"));
                    } catch {
                      console.error("Expected or actual mutation response is not valid JSON.");
                      process.exit(1);
                    }
                    const differingPaths = (actualValue, expectedValue, path = "$") => {
                      if (Object.is(actualValue, expectedValue)) return [];
                      if (
                        actualValue === null || expectedValue === null ||
                        typeof actualValue !== "object" || typeof expectedValue !== "object" ||
                        Array.isArray(actualValue) !== Array.isArray(expectedValue)
                      ) return [path];
                      if (
                        Array.isArray(actualValue) && actualValue.length !== expectedValue.length
                      ) return [`${path}.length`];
                      const keys = new Set([
                        ...Object.keys(actualValue),
                        ...Object.keys(expectedValue),
                      ]);
                      return [...keys].flatMap((key) =>
                        key in actualValue && key in expectedValue
                          ? differingPaths(
                              actualValue[key],
                              expectedValue[key],
                              `${path}.${key}`,
                            )
                          : [`${path}.${key}`]
                      );
                    };
                    try {
                      assert.deepStrictEqual(actualResponse, expectedResponse);
                    } catch {
                      console.error("Mutation changed the stable response contract.");
                      const paths = differingPaths(actualResponse, expectedResponse);
                      console.error(`Differing JSON paths: ${paths.slice(0, 50).join(", ")}`);
                      process.exit(1);
                    }
                  '
                echo "$label idempotent write smoke check passed."
              }

              assert_queue_order_equal() {
                local expected="$1"
                local actual="$2"

                stream_json_pair "$expected" "$actual" | docker exec -i \
                  "convolab-server-$active_color" \
                  node --input-type=module --eval='
                    import assert from "node:assert/strict";
                    process.stdin.setEncoding("utf8");
                    let input = "";
                    for await (const chunk of process.stdin) input += chunk;
                    const fields = input.trimEnd().split("\n");
                    if (fields.length !== 2) {
                      console.error("Expected exactly two framed New Queue responses.");
                      process.exit(1);
                    }
                    const responses = fields.map((field) =>
                      JSON.parse(Buffer.from(field, "base64"))
                    );
                    const ids = (response) => {
                      if (!Array.isArray(response.items)) {
                        throw new TypeError("New Queue response has no items array.");
                      }
                      return response.items.map(({ id }) => id);
                    };
                    try {
                      assert.deepStrictEqual(ids(responses[1]), ids(responses[0]));
                    } catch (error) {
                      console.error(
                        error instanceof TypeError
                          ? error.message
                          : "New Queue reorder changed card membership or order."
                      );
                      process.exit(1);
                    }
                  '
                echo "New Queue reorder preserved card membership and order."
              }

              validate_session_response() {
                local response="$1"

                printf '%s' "$response" | docker exec -i \
                  "convolab-server-$active_color" \
                  node --input-type=module --eval='
                    process.stdin.setEncoding("utf8");
                    let input = "";
                    for await (const chunk of process.stdin) input += chunk;
                    const response = JSON.parse(input);
                    if (!Array.isArray(response.cards)) {
                      console.error("Learning OS session response has no cards array.");
                      process.exit(1);
                    }
                    if (response.overview === null || typeof response.overview !== "object") {
                      console.error("Learning OS session response has no overview object.");
                      process.exit(1);
                    }
                  '
                echo "Study session Learning OS smoke check passed."
              }

              mutate_proxy_route() {
                local method="$1"
                local path="$2"
                local body="$3"
                local response_file
                local status

                response_file="$(mktemp)"
                status="$(curl --silent --show-error \
                  --output "$response_file" \
                  --write-out '%{http_code}' \
                  --request "$method" \
                  --header 'Accept: application/json' \
                  --header 'Content-Type: application/json' \
                  --header 'Origin: https://convo-lab.com' \
                  --header "X-CSRF-Token: $csrf_token" \
                  --header "Cookie: token=$auth_token; XSRF-TOKEN=$csrf_cookie_raw" \
                  --data "$body" \
                  "https://convo-lab.com$path")"

                if [[ ! "$status" =~ ^2[0-9][0-9]$ ]]; then
                  echo "$method $path failed with HTTP $status:" >&2
                  cat "$response_file" >&2
                  echo >&2
                  rm -f "$response_file"
                  return 1
                fi

                cat "$response_file"
                rm -f "$response_file"
              }

              admin_stats="$(fetch_read_route 'Admin stats Learning OS' '/api/admin/stats')"
              printf '%s' "$admin_stats" | docker exec -i \
                "convolab-server-$active_color" node --input-type=module --eval='
                  const chunks = [];
                  for await (const chunk of process.stdin) chunks.push(chunk);
                  const stats = JSON.parse(Buffer.concat(chunks).toString("utf8"));
                  if (
                    !Number.isInteger(stats?.users) ||
                    !Number.isInteger(stats?.episodes) ||
                    !Number.isInteger(stats?.courses) ||
                    !Number.isInteger(stats?.inviteCodes?.total)
                  ) process.exit(1);
                '
              admin_users="$(fetch_read_route 'Admin users Learning OS' '/api/admin/users?limit=1')"
              admin_user_id="$(printf '%s' "$admin_users" | docker exec -i \
                "convolab-server-$active_color" node --input-type=module --eval='
                  const chunks = [];
                  for await (const chunk of process.stdin) chunks.push(chunk);
                  const response = JSON.parse(Buffer.concat(chunks).toString("utf8"));
                  const id = response?.users?.[0]?.id;
                  if (
                    typeof id !== "string" ||
                    !/^[0-9a-f]{8}-[0-9a-f]{4}-[1-8][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(id)
                  ) process.exit(1);
                  process.stdout.write(id);
                ')"
              test -n "$admin_user_id"
              fetch_read_route \
                'Admin user info Learning OS' \
                "/api/admin/users/$admin_user_id/info" \
                > /dev/null
              fetch_read_route \
                'Admin invite codes Learning OS' \
                '/api/admin/invite-codes?limit=1' \
                > /dev/null
              echo "Admin Learning OS read smoke checks passed."

              fetch_read_route \
                'Overview Learning OS' \
                '/api/learning-os/study/overview?timeZone=America%2FNew_York' \
                > /dev/null

              episode_list="$(fetch_read_route \
                'Episode list Learning OS' \
                '/api/episodes?library=true&limit=1&offset=0')"
              episode_id="$(printf '%s' "$episode_list" | docker exec -i \
                "convolab-server-$active_color" node --input-type=module --eval='
                  const chunks = [];
                  for await (const chunk of process.stdin) chunks.push(chunk);
                  const episodes = JSON.parse(Buffer.concat(chunks).toString("utf8"));
                  if (!Array.isArray(episodes)) process.exit(1);
                  if (episodes.length === 0) process.exit(0);
                  const id = episodes[0]?.id;
                  if (
                    typeof id !== "string" ||
                    !/^[0-9a-f]{8}-[0-9a-f]{4}-[1-8][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(id)
                  ) process.exit(1);
                  process.stdout.write(id);
                ')"
              if [ -n "$episode_id" ]; then
                episode_detail="$(fetch_read_route \
                  'Episode detail Learning OS' \
                  "/api/episodes/$episode_id")"
                printf '%s' "$episode_detail" | docker exec -i \
                  -e EXPECTED_EPISODE_ID="$episode_id" \
                  "convolab-server-$active_color" node --input-type=module --eval='
                    const chunks = [];
                    for await (const chunk of process.stdin) chunks.push(chunk);
                    const episode = JSON.parse(Buffer.concat(chunks).toString("utf8"));
                    if (
                      episode === null ||
                      typeof episode !== "object" ||
                      Array.isArray(episode) ||
                      episode.id !== process.env.EXPECTED_EPISODE_ID
                    ) process.exit(1);
                  '
              fi
              echo "Episode Learning OS read smoke checks passed."

              episode_write_smoke_marker="$(cat /proc/sys/kernel/random/uuid)"
              if ! [[ "$episode_write_smoke_marker" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$ ]]; then
                echo "Unable to generate a valid episode-write smoke marker." >&2
                exit 1
              fi
              episode_create_body="$(docker exec \
                -e EPISODE_WRITE_SMOKE_MARKER="$episode_write_smoke_marker" \
                "convolab-server-$active_color" node --input-type=module --eval='
                  process.stdout.write(JSON.stringify({
                    title: `Learning OS episode write smoke ${process.env.EPISODE_WRITE_SMOKE_MARKER}`,
                    sourceText: "Disposable production episode rehearsal source text.",
                    targetLanguage: "ja",
                    nativeLanguage: "en",
                    audioSpeed: "slow",
                    jlptLevel: "N3",
                    autoGenerateAudio: false,
                  }));
                ')"
              episode_create="$(mutate_proxy_route POST '/api/episodes' "$episode_create_body")"
              episode_write_smoke_id="$(printf '%s' "$episode_create" | docker exec -i \
                -e EPISODE_WRITE_SMOKE_MARKER="$episode_write_smoke_marker" \
                "convolab-server-$active_color" node --input-type=module --eval='
                  const chunks = [];
                  for await (const chunk of process.stdin) chunks.push(chunk);
                  const episode = JSON.parse(Buffer.concat(chunks).toString("utf8"));
                  if (
                    typeof episode?.id !== "string" ||
                    !/^[0-9a-f]{8}-[0-9a-f]{4}-[1-8][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(episode.id) ||
                    episode.title !== `Learning OS episode write smoke ${process.env.EPISODE_WRITE_SMOKE_MARKER}` ||
                    episode.sourceText !== "Disposable production episode rehearsal source text." ||
                    episode.targetLanguage !== "ja" ||
                    episode.nativeLanguage !== "en" ||
                    episode.audioSpeed !== "slow" ||
                    episode.jlptLevel !== "N3" ||
                    episode.autoGenerateAudio !== false ||
                    episode.status !== "draft"
                  ) process.exit(1);
                  process.stdout.write(episode.id);
                ')"
              test -n "$episode_write_smoke_id"

              episode_update_body="$(docker exec \
                -e EPISODE_WRITE_SMOKE_MARKER="$episode_write_smoke_marker" \
                "convolab-server-$active_color" node --input-type=module --eval='
                  process.stdout.write(JSON.stringify({
                    title: `Learning OS episode write smoke updated ${process.env.EPISODE_WRITE_SMOKE_MARKER}`,
                    status: "ready",
                  }));
                ')"
              episode_update="$(mutate_proxy_route \
                PATCH \
                "/api/episodes/$episode_write_smoke_id" \
                "$episode_update_body")"
              printf '%s' "$episode_update" | docker exec -i \
                "convolab-server-$active_color" node --input-type=module --eval='
                  const chunks = [];
                  for await (const chunk of process.stdin) chunks.push(chunk);
                  const response = JSON.parse(Buffer.concat(chunks).toString("utf8"));
                  if (response?.message !== "Episode updated successfully") process.exit(1);
                '
              episode_updated_detail="$(fetch_read_route \
                'Updated episode Learning OS' \
                "/api/episodes/$episode_write_smoke_id")"
              printf '%s' "$episode_updated_detail" | docker exec -i \
                -e EXPECTED_EPISODE_ID="$episode_write_smoke_id" \
                -e EPISODE_WRITE_SMOKE_MARKER="$episode_write_smoke_marker" \
                "convolab-server-$active_color" node --input-type=module --eval='
                  const chunks = [];
                  for await (const chunk of process.stdin) chunks.push(chunk);
                  const episode = JSON.parse(Buffer.concat(chunks).toString("utf8"));
                  if (
                    episode?.id !== process.env.EXPECTED_EPISODE_ID ||
                    episode.title !== `Learning OS episode write smoke updated ${process.env.EPISODE_WRITE_SMOKE_MARKER}` ||
                    episode.sourceText !== "Disposable production episode rehearsal source text." ||
                    episode.audioSpeed !== "slow" ||
                    episode.jlptLevel !== "N3" ||
                    episode.autoGenerateAudio !== false ||
                    episode.status !== "ready"
                  ) process.exit(1);
                '

              episode_delete="$(mutate_proxy_route \
                DELETE \
                "/api/episodes/$episode_write_smoke_id" \
                '{}')"
              printf '%s' "$episode_delete" | docker exec -i \
                "convolab-server-$active_color" node --input-type=module --eval='
                  const chunks = [];
                  for await (const chunk of process.stdin) chunks.push(chunk);
                  const response = JSON.parse(Buffer.concat(chunks).toString("utf8"));
                  if (response?.message !== "Episode deleted successfully") process.exit(1);
                '
              docker exec -e EPISODE_WRITE_SMOKE_ID="$episode_write_smoke_id" \
                learning-os-api php artisan tinker --execute='
                  App\Domain\Content\Models\ContentEpisode::query()
                    ->whereKey(getenv("EPISODE_WRITE_SMOKE_ID"))
                    ->doesntExist() || throw new RuntimeException("Deleted smoke episode still exists.");
                ' > /dev/null
              cleanup_episode_write_smoke
              echo "Episode Learning OS CRUD smoke check passed."

              course_list="$(fetch_read_route \
                'Course list Learning OS' \
                '/api/courses?library=true&limit=1&offset=0')"
              course_id="$(printf '%s' "$course_list" | docker exec -i \
                "convolab-server-$active_color" node --input-type=module --eval='
                  const chunks = [];
                  for await (const chunk of process.stdin) chunks.push(chunk);
                  const courses = JSON.parse(Buffer.concat(chunks).toString("utf8"));
                  if (!Array.isArray(courses)) process.exit(1);
                  if (courses.length === 0) process.exit(0);
                  const id = courses[0]?.id;
                  if (
                    typeof id !== "string" ||
                    !/^[0-9a-f]{8}-[0-9a-f]{4}-[1-8][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(id)
                  ) process.exit(1);
                  process.stdout.write(id);
                ')"
              if [ -n "$course_id" ]; then
                course_detail="$(fetch_read_route \
                  'Course detail Learning OS' \
                  "/api/courses/$course_id")"
                printf '%s' "$course_detail" | docker exec -i \
                  -e EXPECTED_COURSE_ID="$course_id" \
                  "convolab-server-$active_color" node --input-type=module --eval='
                    const chunks = [];
                    for await (const chunk of process.stdin) chunks.push(chunk);
                    const course = JSON.parse(Buffer.concat(chunks).toString("utf8"));
