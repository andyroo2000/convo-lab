name: Deploy Learning OS (Production)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Immutable Learning OS image tag (main-<full-sha>)'
        required: true
        type: string
      smoke_user_email:
        description: 'Existing ConvoLab user used for import and proxy smoke checks'
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy private API and copied database
    runs-on: ubuntu-latest
    # 10m image pull + 65m worker drain + 10m health gates + 15m setup/smoke.
    timeout-minutes: 100
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate inputs
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          SMOKE_USER_EMAIL: ${{ inputs.smoke_user_email }}
          DEPLOY_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if ! [[ "$IMAGE_TAG" =~ ^main-[0-9a-f]{40}$ ]]; then
            echo "::error::image_tag must be an immutable main-<full-sha> tag"
            exit 1
          fi

          if ! [[ "$SMOKE_USER_EMAIL" =~ ^[^[:space:]@]+@[^[:space:]@]+\.[^[:space:]@]+$ ]]; then
            echo "::error::smoke_user_email is not a valid email address"
            exit 1
          fi

          if [ -z "$DEPLOY_RESEND_API_KEY" ]; then
            echo "::error::RESEND_API_KEY secret is not set"
            exit 1
          fi

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy Learning OS
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          SMOKE_USER_EMAIL: ${{ inputs.smoke_user_email }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DEPLOY_GH_PAT: ${{ secrets.GH_PAT }}
          DEPLOY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_GITHUB_ACTOR: ${{ github.actor }}
          DEPLOY_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          printf -v REMOTE_ENV \
            'IMAGE_TAG=%q SMOKE_USER_EMAIL=%q DEPLOY_GH_PAT=%q DEPLOY_GITHUB_TOKEN=%q DEPLOY_GITHUB_ACTOR=%q DEPLOY_RESEND_API_KEY=%q' \
            "$IMAGE_TAG" "$SMOKE_USER_EMAIL" \
            "$DEPLOY_GH_PAT" "$DEPLOY_GITHUB_TOKEN" "$DEPLOY_GITHUB_ACTOR" \
            "$DEPLOY_RESEND_API_KEY"

          deployment_log="$(mktemp)"
          trap 'rm -f "$deployment_log"' EXIT

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=150 \
            "$DROPLET_USER@$DROPLET_HOST" \
            "$REMOTE_ENV bash -s" << 'ENDSSH' | tee "$deployment_log"
            set -euo pipefail

            COMPOSE="docker compose -p convolab-prod -f docker-compose.prod.yml --env-file .env.production"
            RUNTIME_DIR="/opt/convolab-runtime"
            ACTIVE_COLOR_FILE="$RUNTIME_DIR/prod-active-color"
            TARGET_DB="learning_os"
            DRAINING_WORKER_CONTAINER_ID=""
            NEW_PROXY_TOKEN_ID=""
            PROXY_TOKEN_CUTOVER_STARTED=false
            ROUTE_PROXY_CUTOVER_STARTED=false
            PREVIOUS_COURSE_GENERATION_PROXY_ENABLED=false
            PREVIOUS_DIALOGUE_GENERATION_PROXY_ENABLED=false
            PREVIOUS_AUDIO_GENERATION_PROXY_ENABLED=false
            PREVIOUS_SCRIPT_PROXY_ENABLED=false
            PREVIOUS_AUTH_PROXY_ENABLED=false
            WORKER_DRAIN_ATTEMPTS=780
            WORKER_DRAIN_INTERVAL_SECONDS=5
            WORKER_DRAIN_TIMEOUT_MINUTES=$((WORKER_DRAIN_ATTEMPTS * WORKER_DRAIN_INTERVAL_SECONDS / 60))
            GCS_CREDENTIAL_PATH="server/gcloud-key.json"
            # The Learning OS image runs as Debian's www-data user.
            LEARNING_OS_RUNTIME_UID=33

            cleanup_deployment_resources() {
              local cleanup_failed=false
              local course_generation_proxy_restore_ok=true
              local dialogue_generation_proxy_restore_ok=true
              local audio_generation_proxy_restore_ok=true
              local script_proxy_restore_ok=true
              local auth_proxy_restore_ok=true
              local rolled_back_course_generation_proxy
              local rolled_back_dialogue_generation_proxy
              local rolled_back_audio_generation_proxy
              local rolled_back_script_proxy
              local rolled_back_auth_proxy

              if [ "$ROUTE_PROXY_CUTOVER_STARTED" = true ]; then
                echo "Rolling back the Learning OS route proxies."
                upsert_env \
                  LEARNING_OS_COURSE_GENERATION_PROXY_ENABLED \
                  "$PREVIOUS_COURSE_GENERATION_PROXY_ENABLED" \
                  || course_generation_proxy_restore_ok=false
                upsert_env \
                  LEARNING_OS_DIALOGUE_GENERATION_PROXY_ENABLED \
                  "$PREVIOUS_DIALOGUE_GENERATION_PROXY_ENABLED" \
                  || dialogue_generation_proxy_restore_ok=false
                upsert_env \
                  LEARNING_OS_AUDIO_GENERATION_PROXY_ENABLED \
                  "$PREVIOUS_AUDIO_GENERATION_PROXY_ENABLED" \
                  || audio_generation_proxy_restore_ok=false
                upsert_env \
                  LEARNING_OS_SCRIPT_PROXY_ENABLED \
                  "$PREVIOUS_SCRIPT_PROXY_ENABLED" \
                  || script_proxy_restore_ok=false
                upsert_env \
                  LEARNING_OS_AUTH_PROXY_ENABLED \
                  "$PREVIOUS_AUTH_PROXY_ENABLED" \
                  || auth_proxy_restore_ok=false
                if [ "$course_generation_proxy_restore_ok" != true ] \
                  || [ "$dialogue_generation_proxy_restore_ok" != true ] \
                  || [ "$audio_generation_proxy_restore_ok" != true ] \
                  || [ "$script_proxy_restore_ok" != true ] \
                  || [ "$auth_proxy_restore_ok" != true ]; then
                  echo "::error::Failed to restore the route proxy environment values."
                  cleanup_failed=true
                elif ! $COMPOSE up -d --no-deps --force-recreate "server-$active_color"; then
                  echo "::error::Failed to recreate the production server while rolling back route proxies."
                  cleanup_failed=true
                elif ! wait_for_health "convolab-server-$active_color"; then
                  echo "::error::The production server was unhealthy after rolling back route proxies."
                  cleanup_failed=true
                else
                  rolled_back_course_generation_proxy="$(docker inspect \
                    --format='{{range .Config.Env}}{{println .}}{{end}}' \
                    "convolab-server-$active_color" \
                    | sed -n 's/^LEARNING_OS_COURSE_GENERATION_PROXY_ENABLED=//p' \
                    | tail -1)"
                  rolled_back_dialogue_generation_proxy="$(docker inspect \
                    --format='{{range .Config.Env}}{{println .}}{{end}}' \
                    "convolab-server-$active_color" \
                    | sed -n 's/^LEARNING_OS_DIALOGUE_GENERATION_PROXY_ENABLED=//p' \
                    | tail -1)"
                  rolled_back_audio_generation_proxy="$(docker inspect \
                    --format='{{range .Config.Env}}{{println .}}{{end}}' \
                    "convolab-server-$active_color" \
                    | sed -n 's/^LEARNING_OS_AUDIO_GENERATION_PROXY_ENABLED=//p' \
                    | tail -1)"
                  rolled_back_script_proxy="$(docker inspect \
                    --format='{{range .Config.Env}}{{println .}}{{end}}' \
                    "convolab-server-$active_color" \
                    | sed -n 's/^LEARNING_OS_SCRIPT_PROXY_ENABLED=//p' \
                    | tail -1)"
                  rolled_back_auth_proxy="$(docker inspect \
                    --format='{{range .Config.Env}}{{println .}}{{end}}' \
                    "convolab-server-$active_color" \
                    | sed -n 's/^LEARNING_OS_AUTH_PROXY_ENABLED=//p' \
                    | tail -1)"
                  if [ "$rolled_back_course_generation_proxy" != "$PREVIOUS_COURSE_GENERATION_PROXY_ENABLED" ] \
                    || [ "$rolled_back_dialogue_generation_proxy" != "$PREVIOUS_DIALOGUE_GENERATION_PROXY_ENABLED" ] \
                    || [ "$rolled_back_audio_generation_proxy" != "$PREVIOUS_AUDIO_GENERATION_PROXY_ENABLED" ] \
                    || [ "$rolled_back_script_proxy" != "$PREVIOUS_SCRIPT_PROXY_ENABLED" ] \
                    || [ "$rolled_back_auth_proxy" != "$PREVIOUS_AUTH_PROXY_ENABLED" ]; then
                    echo "::error::The production server retained a route proxy after rollback."
                    cleanup_failed=true
                  fi
                fi
              fi

              if [ -n "$NEW_PROXY_TOKEN_ID" ] && [ "$PROXY_TOKEN_CUTOVER_STARTED" != true ]; then
                echo "Removing the unused Learning OS proxy token."
                $COMPOSE run --rm -T --no-deps \
                  -e CONVOLAB_PROXY_USER_EMAIL="$SMOKE_USER_EMAIL" \
                  -e CONVOLAB_PROXY_TOKEN_ID="$NEW_PROXY_TOKEN_ID" \
                  learning-os php artisan tinker --execute='
                    $user = App\Models\User::query()
                      ->where("email", getenv("CONVOLAB_PROXY_USER_EMAIL"))
                      ->sole();
                    $user->tokens()
                      ->where("name", "convolab-proxy")
                      ->where("id", getenv("CONVOLAB_PROXY_TOKEN_ID"))
                      ->delete();
                  ' < /dev/null || true
              fi

              if [ -n "$DRAINING_WORKER_CONTAINER_ID" ]; then
                current_worker_id="$(docker inspect --format='{{.Id}}' learning-os-worker 2>/dev/null || true)"

                if [ "$current_worker_id" = "$DRAINING_WORKER_CONTAINER_ID" ]; then
                  echo "Restoring the previous Learning OS worker after an interrupted drain."
                  docker update --restart=unless-stopped learning-os-worker >/dev/null || true
                  docker start learning-os-worker >/dev/null || true
                fi
              fi

              if [ "$cleanup_failed" = true ]; then
                return 1
              fi
            }

            trap cleanup_deployment_resources EXIT

            cd /opt/convolab

            git config credential.helper store
            echo "https://$DEPLOY_GH_PAT@github.com" > ~/.git-credentials
            chmod 600 ~/.git-credentials
            git fetch origin
            git reset --hard origin/main

            if [ ! -s "$GCS_CREDENTIAL_PATH" ]; then
              echo "Learning OS GCS credentials are missing or empty."
              exit 1
            fi
            chown "$LEARNING_OS_RUNTIME_UID:$LEARNING_OS_RUNTIME_UID" "$GCS_CREDENTIAL_PATH"
            chmod 600 "$GCS_CREDENTIAL_PATH"
            test "$(stat -c '%u:%g' "$GCS_CREDENTIAL_PATH")" = \
              "$LEARNING_OS_RUNTIME_UID:$LEARNING_OS_RUNTIME_UID"
            test "$(stat -c '%a' "$GCS_CREDENTIAL_PATH")" = 600

            upsert_env() {
              key="$1"
              value="$2"
              escaped_value="${value//\\/\\\\}"
              escaped_value="${escaped_value//#/\\#}"
              escaped_value="${escaped_value//&/\\&}"

              if grep -q "^${key}=" .env.production; then
                sed -i "s#^${key}=.*#${key}=${escaped_value}#" .env.production
              else
                printf '%s=%s\n' "$key" "$value" >> .env.production
              fi
            }

            wait_for_health() {
              container="$1"

              for attempt in {1..60}; do
                status="$(docker inspect --format='{{.State.Health.Status}}' "$container" 2>/dev/null || echo missing)"
                echo "$container health attempt $attempt/60: $status"

                if [ -z "$status" ] || [ "$status" = missing ]; then
                  echo "$container has no Docker healthcheck; cannot health-gate it."
                  docker logs --tail=200 "$container" || true
                  return 1
                fi

                if [ "$status" = healthy ]; then
                  return 0
                fi

                if [ "$status" = unhealthy ]; then
                  docker logs --tail=200 "$container" || true
                  return 1
                fi

                sleep 5
              done

              docker logs --tail=200 "$container" || true
              return 1
            }

            smoke_learning_os() {
              $COMPOSE run --rm -T --no-deps learning-os \
                php artisan rehearsal:smoke \
                --user-email="$SMOKE_USER_EMAIL" \
                --allow-production \
                --json < /dev/null
            }

            upsert_env LEARNING_OS_IMAGE_TAG "$IMAGE_TAG"
            upsert_env LEARNING_OS_DB "$TARGET_DB"
            upsert_env LEARNING_OS_API_URL "http://learning-os:8080"
            upsert_env LEARNING_OS_PROXY_USER_EMAIL "$SMOKE_USER_EMAIL"
            upsert_env RESEND_API_KEY "$DEPLOY_RESEND_API_KEY"

            read_env_value() {
              key="$1"
              value="$(sed -n "s/^${key}=//p" .env.production | tail -1)"
              if [[ "$value" == \"*\" ]] || [[ "$value" == \'*\' ]]; then
                value="${value:1:${#value}-2}"
              fi
              printf '%s' "$value"
            }

            resend_api_key="$(read_env_value RESEND_API_KEY)"
            email_from="$(read_env_value EMAIL_FROM)"
            client_url="$(read_env_value CLIENT_URL)"
            admin_emails="$(read_env_value ADMIN_EMAILS)"

            if [ -z "$email_from" ]; then
              email_from="ConvoLab <noreply@convolab.app>"
              upsert_env EMAIL_FROM "$email_from"
            fi

            if [ -z "$resend_api_key" ]; then
              echo "RESEND_API_KEY is required to send Learning OS verification emails."
              exit 1
            fi
            if ! [[ "$client_url" =~ ^https://[^[:space:]]+$ ]]; then
              echo "CLIENT_URL must be an HTTPS URL for Learning OS verification links."
              exit 1
            fi
            if [ -z "$admin_emails" ]; then
              echo "ADMIN_EMAILS is required to preserve the Learning OS admin allowlist."
              exit 1
            fi

            mail_from_name="ConvoLab"
            mail_from_address="$email_from"
            if [[ "$email_from" == *\<*\>* ]]; then
              mail_from_name="$(printf '%s' "${email_from%%<*}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
              mail_from_address="${email_from#*<}"
              mail_from_address="${mail_from_address%%>*}"
            fi
            if ! [[ "$mail_from_address" =~ ^[^[:space:]@]+@[^[:space:]@]+\.[^[:space:]@]+$ ]]; then
              echo "EMAIL_FROM must contain a valid sender email address."
              exit 1
            fi
            if [ -z "$mail_from_name" ]; then
              mail_from_name="ConvoLab"
            fi

            upsert_env LEARNING_OS_MAIL_FROM_ADDRESS "$mail_from_address"
            upsert_env LEARNING_OS_MAIL_FROM_NAME "$mail_from_name"
            auth_mail_config_revision="$(printf '%s\0%s\0%s\0%s\0%s' \
              "$resend_api_key" \
              "$mail_from_address" \
              "$mail_from_name" \
              "$client_url" \
              "$admin_emails" \
              | sha256sum \
              | cut -d ' ' -f 1)"
            upsert_env LEARNING_OS_AUTH_MAIL_CONFIG_REVISION "$auth_mail_config_revision"

            previous_course_generation_proxy="$(sed -n \
              's/^LEARNING_OS_COURSE_GENERATION_PROXY_ENABLED=//p' \
              .env.production | tail -1)"
            case "$previous_course_generation_proxy" in
              true|false)
                PREVIOUS_COURSE_GENERATION_PROXY_ENABLED="$previous_course_generation_proxy"
                ;;
              '') ;;
              *)
                echo "Invalid LEARNING_OS_COURSE_GENERATION_PROXY_ENABLED value."
                exit 1
                ;;
            esac

            previous_dialogue_generation_proxy="$(sed -n \
              's/^LEARNING_OS_DIALOGUE_GENERATION_PROXY_ENABLED=//p' \
              .env.production | tail -1)"
            case "$previous_dialogue_generation_proxy" in
              true|false)
                PREVIOUS_DIALOGUE_GENERATION_PROXY_ENABLED="$previous_dialogue_generation_proxy"
                ;;
              '') ;;
              *)
                echo "Invalid LEARNING_OS_DIALOGUE_GENERATION_PROXY_ENABLED value."
                exit 1
                ;;
            esac

            previous_audio_generation_proxy="$(sed -n \
              's/^LEARNING_OS_AUDIO_GENERATION_PROXY_ENABLED=//p' \
              .env.production | tail -1)"
            case "$previous_audio_generation_proxy" in
              true|false)
                PREVIOUS_AUDIO_GENERATION_PROXY_ENABLED="$previous_audio_generation_proxy"
                ;;
              '') ;;
              *)
                echo "Invalid LEARNING_OS_AUDIO_GENERATION_PROXY_ENABLED value."
                exit 1
                ;;
            esac

            previous_script_proxy="$(sed -n \
              's/^LEARNING_OS_SCRIPT_PROXY_ENABLED=//p' \
              .env.production | tail -1)"
            case "$previous_script_proxy" in
              true|false)
                PREVIOUS_SCRIPT_PROXY_ENABLED="$previous_script_proxy"
                ;;
              '') ;;
              *)
                echo "Invalid LEARNING_OS_SCRIPT_PROXY_ENABLED value."
                exit 1
                ;;
            esac

            previous_auth_proxy="$(sed -n \
              's/^LEARNING_OS_AUTH_PROXY_ENABLED=//p' \
              .env.production | tail -1)"
            case "$previous_auth_proxy" in
              true|false)
                PREVIOUS_AUTH_PROXY_ENABLED="$previous_auth_proxy"
                ;;
              '') ;;
              *)
                echo "Invalid LEARNING_OS_AUTH_PROXY_ENABLED value."
                exit 1
                ;;
            esac

            if ! grep -Eq '^LEARNING_OS_APP_KEY=base64:.+$' .env.production; then
              upsert_env LEARNING_OS_APP_KEY "base64:$(openssl rand -base64 32 | tr -d '\n')"
            fi

            echo "$DEPLOY_GITHUB_TOKEN" | docker login ghcr.io -u "$DEPLOY_GITHUB_ACTOR" --password-stdin
            timeout 600 $COMPOSE pull learning-os learning-os-worker
            $COMPOSE up -d postgres

            $COMPOSE run --rm -T --no-deps learning-os php artisan migrate --force < /dev/null

            source_db="$(sed -n 's/^POSTGRES_DB=//p' .env.production | tail -1)"
            test -n "$source_db"
            test "$source_db" != "$TARGET_DB"
            $COMPOSE run --rm -T --no-deps learning-os \
              php artisan content:import-convolab-episodes \
              --source-database="$source_db" \
              --truncate \
              --allow-production \
              --production-truncate-confirmation="TRUNCATE $TARGET_DB" < /dev/null

            $COMPOSE run --rm -T --no-deps learning-os \
              php artisan admin:sync-convolab \
              --source-database="$source_db" \
              --allow-production < /dev/null

            proxy_token_output="$($COMPOSE run --rm -T --no-deps \
              -e CONVOLAB_PROXY_USER_EMAIL="$SMOKE_USER_EMAIL" \
              learning-os php artisan tinker --execute='
                $user = App\Models\User::query()->where("email", getenv("CONVOLAB_PROXY_USER_EMAIL"))->sole();
                $accessToken = $user->createToken("convolab-proxy", [
                  "study:read",
                  "study:write",
                  "feature-flags:read",
                  "feature-flags:write",
                  "content:write",
                  "admin:read",
                  "auth:login",
                  "auth:read",
                  "auth:signup",
                  "auth:verification",
                ]);
                echo "PROXY_TOKEN_ID=".$accessToken->accessToken->getKey().PHP_EOL;
                echo "PROXY_TOKEN=".$accessToken->plainTextToken.PHP_EOL;
              ' < /dev/null)"
            NEW_PROXY_TOKEN_ID="$(printf '%s\n' "$proxy_token_output" \
              | sed -n 's/^PROXY_TOKEN_ID=//p' \
              | grep -E '^[0-9]+$' \
              | tail -1)"
            proxy_token="$(printf '%s\n' "$proxy_token_output" \
              | sed -n 's/^PROXY_TOKEN=//p' \
              | grep -E '^[0-9]+\|learning_os_[[:alnum:]]{40}[0-9a-f]{8}$' \
              | tail -1)"
            test -n "$NEW_PROXY_TOKEN_ID"
            test -n "$proxy_token"
            echo "::add-mask::$proxy_token"
            upsert_env LEARNING_OS_API_TOKEN "$proxy_token"

            desired_learning_os_image="ghcr.io/andyroo2000/learning-os:$IMAGE_TAG"

            ensure_learning_os_service() {
              service="$1"
              container="$2"
              current_image="$(docker inspect --format='{{.Config.Image}}' "$container" 2>/dev/null || true)"
              running="$(docker inspect --format='{{.State.Running}}' "$container" 2>/dev/null || true)"
              current_proxy_user_email="$(docker inspect \
                --format='{{range .Config.Env}}{{println .}}{{end}}' \
                "$container" 2>/dev/null \
                | sed -n 's/^CONVOLAB_PROXY_USER_EMAIL=//p' \
                | tail -1 || true)"
              current_config_revision="$(docker inspect \
                --format='{{range .Config.Env}}{{println .}}{{end}}' \
                "$container" 2>/dev/null \
                | sed -n 's/^LEARNING_OS_DEPLOY_CONFIG_REVISION=//p' \
                | tail -1 || true)"
              current_auth_mail_config_revision="$(docker inspect \
                --format='{{range .Config.Env}}{{println .}}{{end}}' \
                "$container" 2>/dev/null \
                | sed -n 's/^LEARNING_OS_AUTH_MAIL_CONFIG_REVISION=//p' \
                | tail -1 || true)"

              if [ "$current_image" = "$desired_learning_os_image" ] \
                && [ "$running" = true ] \
                && [ "$current_proxy_user_email" = "$SMOKE_USER_EMAIL" ] \
                && [ "$current_config_revision" = "auth-mail-v1" ] \
                && [ "$current_auth_mail_config_revision" = "$auth_mail_config_revision" ]; then
                echo "Reusing running $container on immutable image $desired_learning_os_image."
                return
              fi

              $COMPOSE up -d --no-deps --force-recreate "$service"
            }

            ensure_learning_os_worker() {
              container="learning-os-worker"
              current_image="$(docker inspect --format='{{.Config.Image}}' "$container" 2>/dev/null || true)"
              running="$(docker inspect --format='{{.State.Running}}' "$container" 2>/dev/null || true)"
              current_command="$(docker inspect --format='{{join .Config.Cmd " "}}' "$container" 2>/dev/null || true)"
              current_config_revision="$(docker inspect \
                --format='{{range .Config.Env}}{{println .}}{{end}}' \
                "$container" 2>/dev/null \
                | sed -n 's/^LEARNING_OS_DEPLOY_CONFIG_REVISION=//p' \
                | tail -1 || true)"
              current_auth_mail_config_revision="$(docker inspect \
                --format='{{range .Config.Env}}{{println .}}{{end}}' \
                "$container" 2>/dev/null \
                | sed -n 's/^LEARNING_OS_AUTH_MAIL_CONFIG_REVISION=//p' \
                | tail -1 || true)"
              desired_queue_argument="--queue=study-imports,study-card-drafts,default"

              if [ "$current_image" = "$desired_learning_os_image" ] \
                && [ "$running" = true ] \
                && [ "$current_config_revision" = "auth-mail-v1" ] \
                && [ "$current_auth_mail_config_revision" = "$auth_mail_config_revision" ] \
                && [[ " $current_command " == *" $desired_queue_argument "* ]]; then
                echo "Reusing running $container on immutable image $desired_learning_os_image."
                return
              fi

              if [ "$running" = true ]; then
                echo "Draining $container before replacing $current_image."
                DRAINING_WORKER_CONTAINER_ID="$(docker inspect --format='{{.Id}}' "$container")"
                docker update --restart=no "$container" >/dev/null

                if ! docker exec "$container" php artisan queue:restart; then
                  docker update --restart=unless-stopped "$container" >/dev/null || true
                  DRAINING_WORKER_CONTAINER_ID=""
                  return 1
                fi

                for ((attempt = 1; attempt <= WORKER_DRAIN_ATTEMPTS; attempt++)); do
                  running="$(docker inspect --format='{{.State.Running}}' "$container" 2>/dev/null || true)"

                  if [ "$running" != true ]; then
                    break
                  fi

                  echo "$container drain attempt $attempt/$WORKER_DRAIN_ATTEMPTS: waiting for the current job to finish."
                  sleep "$WORKER_DRAIN_INTERVAL_SECONDS"
                done

                if [ "$running" = true ]; then
                  echo "$container did not drain within $WORKER_DRAIN_TIMEOUT_MINUTES minutes."
                  docker update --restart=unless-stopped "$container" >/dev/null || true
                  DRAINING_WORKER_CONTAINER_ID=""
                  return 1
                fi
              fi

              $COMPOSE up -d --no-deps --force-recreate learning-os-worker
              DRAINING_WORKER_CONTAINER_ID=""
            }

            # Reconcile independently so an unchanged busy worker is not drained merely
            # because the ConvoLab proxy token rotated.
            ensure_learning_os_service learning-os learning-os-api
            ensure_learning_os_worker
            wait_for_health learning-os-api
            wait_for_health learning-os-worker

            docker exec \
              -e EXPECTED_CLIENT_URL="$client_url" \
              -e EXPECTED_ADMIN_EMAILS="$admin_emails" \
