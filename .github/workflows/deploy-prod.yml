name: Deploy ConvoLab (Production)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (ex: main-<sha> or latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to DigitalOcean (Production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is not set"
            exit 1
          fi
          curl -fsS https://api.openai.com/v1/models \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -o /dev/null

      - name: Validate Google OAuth credentials
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          if [ -z "$GOOGLE_CLIENT_ID" ] || [ -z "$GOOGLE_CLIENT_SECRET" ]; then
            echo "::error::GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET secrets must be set"
            exit 1
          fi
          if [ "$GOOGLE_CLIENT_ID" = placeholder ]; then
            echo "::error::GOOGLE_CLIENT_ID must not use the placeholder sentinel"
            exit 1
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to droplet
        env:
          DEPLOY_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          DEPLOY_GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          BROWSER_SESSION_ENABLED: ${{ vars.LEARNING_OS_BROWSER_SESSION_ENABLED || 'true' }}
          DIRECT_ACCOUNT_API_ENABLED: ${{ vars.LEARNING_OS_DIRECT_ACCOUNT_API_ENABLED || 'false' }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          {
            printf 'DEPLOY_GOOGLE_CLIENT_ID=%q\n' "$DEPLOY_GOOGLE_CLIENT_ID"
            printf 'DEPLOY_GOOGLE_CLIENT_SECRET=%q\n' "$DEPLOY_GOOGLE_CLIENT_SECRET"
            printf 'BROWSER_SESSION_ENABLED=%q\n' "$BROWSER_SESSION_ENABLED"
            printf 'DIRECT_ACCOUNT_API_ENABLED=%q\n' "$DIRECT_ACCOUNT_API_ENABLED"
            cat << 'ENDSSH'
            set -euo pipefail

            echo "🚀 Starting ConvoLab production deployment..."
            IMAGE_TAG="${{ inputs.image_tag }}"
            COMPOSE="docker compose -p convolab-prod -f docker-compose.prod.yml --env-file .env.production"
            RUNTIME_DIR="/opt/convolab-runtime"
            ROUTER_DIR="$RUNTIME_DIR/prod-router"
            ACTIVE_COLOR_FILE="$RUNTIME_DIR/prod-active-color"
            ROUTER_CONFIG="$ROUTER_DIR/default.conf"
            ROUTER_TEMPLATE="deploy/prod-router.conf.template"

            cd /opt/convolab

            git config credential.helper store
            echo "https://${{ secrets.GH_PAT }}@github.com" > ~/.git-credentials
            chmod 600 ~/.git-credentials

            echo "📦 Pulling latest code from GitHub..."
            git fetch origin
            git reset --hard origin/main

            upsert_env() {
              key="$1"
              value="$2"
              escaped_value="${value//\\/\\\\}"
              escaped_value="${escaped_value//#/\\#}"
              escaped_value="${escaped_value//&/\\&}"

              if grep -q "^${key}=" .env.production; then
                sed -i "s#^${key}=.*#${key}=${escaped_value}#" .env.production
              else
                printf '%s=%s\n' "$key" "$value" >> .env.production
              fi
            }

            echo "🔧 Updating production environment values..."
            if grep -q '^FISH_AUDIO_API_KEY=' .env.production; then
              sed -i "s#^FISH_AUDIO_API_KEY=.*#FISH_AUDIO_API_KEY=${{ secrets.FISH_AUDIO_API_KEY }}#g" .env.production
            else
              echo "FISH_AUDIO_API_KEY=${{ secrets.FISH_AUDIO_API_KEY }}" >> .env.production
            fi

            if grep -q '^CLIENT_URL=' .env.production; then
              sed -i "s#^CLIENT_URL=.*#CLIENT_URL=https://convo-lab.com#g" .env.production
            else
              echo "CLIENT_URL=https://convo-lab.com" >> .env.production
            fi

            upsert_env GOOGLE_CLIENT_ID "$DEPLOY_GOOGLE_CLIENT_ID"
            upsert_env GOOGLE_CLIENT_SECRET "$DEPLOY_GOOGLE_CLIENT_SECRET"
            upsert_env GOOGLE_CALLBACK_URL https://convo-lab.com/api/auth/google/callback
            browser_session_enabled="$BROWSER_SESSION_ENABLED"
            if [ "$browser_session_enabled" != true ] && [ "$browser_session_enabled" != false ]; then
              echo "::error::LEARNING_OS_BROWSER_SESSION_ENABLED must be true or false"
              exit 1
            fi
            upsert_env LEARNING_OS_BROWSER_SESSION_ENABLED "$browser_session_enabled"
            previous_direct_account_api_enabled="$(
              awk -F= '$1 == "LEARNING_OS_DIRECT_ACCOUNT_API_ENABLED" { value = $2 } END { print value }' .env.production
            )"
            if [ "$previous_direct_account_api_enabled" != true ]; then
              previous_direct_account_api_enabled=false
            fi
            direct_account_api_enabled="$DIRECT_ACCOUNT_API_ENABLED"
            if [ "$direct_account_api_enabled" != true ] && [ "$direct_account_api_enabled" != false ]; then
              echo "::error::LEARNING_OS_DIRECT_ACCOUNT_API_ENABLED must be true or false"
              exit 1
            fi
            upsert_env LEARNING_OS_DIRECT_ACCOUNT_API_ENABLED "$direct_account_api_enabled"

            if grep -q '^OPENAI_API_KEY=' .env.production; then
              sed -i "s#^OPENAI_API_KEY=.*#OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}#g" .env.production
            else
              echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env.production
            fi

            if grep -q '^LLM_PROVIDER=' .env.production; then
              sed -i "s#^LLM_PROVIDER=.*#LLM_PROVIDER=openai#g" .env.production
            else
              echo "LLM_PROVIDER=openai" >> .env.production
            fi

            if grep -q '^STUDY_CARD_GENERATOR_MODEL=' .env.production; then
              sed -i "s#^STUDY_CARD_GENERATOR_MODEL=.*#STUDY_CARD_GENERATOR_MODEL=gpt-5.5#g" .env.production
            else
              echo "STUDY_CARD_GENERATOR_MODEL=gpt-5.5" >> .env.production
            fi

            if ! grep -Eq '^OPENAI_API_KEY=.+$' .env.production; then
              echo "❌ OPENAI_API_KEY is missing after production env injection."
              exit 1
            fi

            mkdir -p "$ROUTER_DIR"
            export CONVOLAB_IMAGE_TAG="$IMAGE_TAG"
            export CONVOLAB_ROUTER_DIR="$ROUTER_DIR"

            if grep -q '^CONVOLAB_IMAGE_TAG=' .env.production; then
              sed -i "s#^CONVOLAB_IMAGE_TAG=.*#CONVOLAB_IMAGE_TAG=$IMAGE_TAG#g" .env.production
            else
              echo "CONVOLAB_IMAGE_TAG=$IMAGE_TAG" >> .env.production
            fi

            if grep -q '^CONVOLAB_ROUTER_DIR=' .env.production; then
              sed -i "s#^CONVOLAB_ROUTER_DIR=.*#CONVOLAB_ROUTER_DIR=$ROUTER_DIR#g" .env.production
            else
              echo "CONVOLAB_ROUTER_DIR=$ROUTER_DIR" >> .env.production
            fi
            sed -i '/^CONVOLAB_ROUTER_CONFIG=/d' .env.production

            render_router_config() {
              color="$1"
              direct_account_enabled="${2:-$direct_account_api_enabled}"
              upstream="convolab-server-$color"
              if [ ! -s "$ROUTER_TEMPLATE" ]; then
                echo "❌ Router template is missing or empty: $ROUTER_TEMPLATE"
                exit 1
              fi
              if [ "$direct_account_enabled" = true ]; then
                direct_account_enabled_value=1
              else
                direct_account_enabled_value=0
              fi
              sed \
                -e "s#__UPSTREAM_SERVICE__#$upstream#g" \
                -e "s#__DIRECT_ACCOUNT_API_ENABLED__#$direct_account_enabled_value#g" \
                "$ROUTER_TEMPLATE" > "$ROUTER_CONFIG.tmp"
              if ! grep -q "$upstream" "$ROUTER_CONFIG.tmp"; then
                echo "❌ Generated router config does not reference $upstream"
                exit 1
              fi
              if grep -q '__DIRECT_ACCOUNT_API_ENABLED__' "$ROUTER_CONFIG.tmp"; then
                echo "❌ Generated router config retains the direct account placeholder"
                exit 1
              fi
              if [ -e "$ROUTER_CONFIG" ]; then
                # Preserve the bind-mounted file inode so the running router sees updates.
                cat "$ROUTER_CONFIG.tmp" > "$ROUTER_CONFIG"
                rm "$ROUTER_CONFIG.tmp"
              else
                mv "$ROUTER_CONFIG.tmp" "$ROUTER_CONFIG"
              fi
            }

            write_active_color() {
              color="$1"
              mkdir -p "$(dirname "$ACTIVE_COLOR_FILE")"
              printf '%s\n' "$color" > "$ACTIVE_COLOR_FILE.tmp"
              mv "$ACTIVE_COLOR_FILE.tmp" "$ACTIVE_COLOR_FILE"
            }

            wait_for_container_health() {
              container="$1"
              for i in {1..60}; do
                status=$(docker inspect -f '{{.State.Health.Status}}' "$container" 2>/dev/null || echo "missing")
                echo "$container health: $status"
                if [ "$status" = "healthy" ]; then
                  return 0
                fi
                if [ "$status" = "missing" ]; then
                  echo "⚠️ $container does not exist yet; waiting..."
                fi
                if [ -z "$status" ]; then
                  echo "❌ $container has no Docker healthcheck; cannot health-gate it."
                  return 1
                fi
                if [ "$status" = "unhealthy" ]; then
                  echo "❌ $container reported unhealthy. Recent logs:"
                  docker logs --tail=200 "$container" || true
                  return 1
                fi
                sleep 5
              done
              echo "❌ $container did not become healthy in time. Recent logs:"
              docker logs --tail=200 "$container" || true
              return 1
            }

            verify_public_health() {
              for i in {1..20}; do
                if curl -fsS https://convo-lab.com/health > /dev/null; then
                  echo "✅ Public production health check passed."
                  return 0
                fi
                echo "Public health attempt $i/20 failed; retrying in 3s..."
                sleep 3
              done
              return 1
            }

            verify_public_google_oauth() {
              for attempt in {1..5}; do
                oauth_failure=""
                if ! oauth_headers="$(curl --max-time 10 -sS -D - -o /dev/null https://convo-lab.com/api/auth/google)"; then
                  oauth_failure="redirect request failed"
                else
                  oauth_location="$(printf '%s\n' "$oauth_headers" \
                    | sed -n 's/^location: //Ip' | tr -d '\r' | tail -1)"
                  oauth_location_lower="${oauth_location,,}"
                  if [[ "$oauth_location" != https://accounts.google.com/* ]]; then
                    oauth_failure="redirect host is not Google"
                  elif [[ "$oauth_location_lower" != *'redirect_uri=https%3a%2f%2fconvo-lab.com%2fapi%2fauth%2fgoogle%2fcallback'* ]]; then
                    oauth_failure="production callback is missing"
                  elif [[ "$oauth_location" == *'client_id=placeholder'* ]]; then
                    oauth_failure="placeholder client ID is active"
                  elif [[ "$oauth_location" == *'access_type=offline'* ]]; then
                    oauth_failure="offline access is still requested"
                  fi
                fi

                if [ -z "$oauth_failure" ]; then
                  echo "✅ Google OAuth production redirect passed!"
                  return 0
                fi
                echo "Google OAuth attempt $attempt/5 failed: $oauth_failure"
                if [ "$attempt" -lt 5 ]; then
                  sleep 3
                fi
              done
              return 1
            }

            verify_public_learning_os_browser_route() (
              cookie_jar="$(mktemp)"
              response_body="$(mktemp)"
              trap 'rm -f "$cookie_jar" "$response_body"' EXIT

              if [ "$direct_account_api_enabled" = false ]; then
                disabled_status="$(curl --silent --show-error \
                  --output "$response_body" \
                  --write-out '%{http_code}' \
                  --header 'Accept: application/json' \
                  https://convo-lab.com/api/convolab/auth/me)"
                if [ "$disabled_status" != 404 ]; then
                  echo "Disabled direct account route returned HTTP $disabled_status instead of 404."
                  cat "$response_body"
                  return 1
                fi
                echo "✅ Learning OS direct browser route is disabled!"
                return 0
              fi

              csrf_status="$(curl --silent --show-error \
                --cookie-jar "$cookie_jar" \
                --output "$response_body" \
                --write-out '%{http_code}' \
                --header 'Origin: https://convo-lab.com' \
                https://convo-lab.com/sanctum/csrf-cookie)"
              if [ "$csrf_status" != 204 ]; then
                echo "Learning OS CSRF bootstrap returned HTTP $csrf_status."
                cat "$response_body"
                return 1
              fi
              if ! awk '$6 == "XSRF-TOKEN" { found = 1 } END { exit found ? 0 : 1 }' "$cookie_jar"; then
                echo "Learning OS CSRF bootstrap did not set XSRF-TOKEN."
                return 1
              fi
              if ! awk '$6 == "learning_os_session" { found = 1 } END { exit found ? 0 : 1 }' "$cookie_jar"; then
                echo "Learning OS CSRF bootstrap did not set learning_os_session."
                return 1
              fi

              account_status="$(curl --silent --show-error \
                --output "$response_body" \
                --write-out '%{http_code}' \
                --header 'Accept: application/json' \
                https://convo-lab.com/api/convolab/auth/me)"
              if [ "$account_status" != 401 ]; then
                echo "Unauthenticated direct account probe returned HTTP $account_status."
                cat "$response_body"
                return 1
              fi
              if ! grep -q '"message":"Unauthenticated."' "$response_body"; then
                echo "Direct account probe did not return the Learning OS auth contract."
                cat "$response_body"
                return 1
              fi

              echo "✅ Learning OS direct browser route passed!"
            )

            reload_router() {
              router_running="$(docker inspect -f '{{.State.Running}}' convolab-server 2>/dev/null || echo "false")"
              if [ "$router_running" = "true" ]; then
                router_config_dir_source="$(docker inspect -f '{{range .Mounts}}{{if eq .Destination "/etc/nginx/conf.d"}}{{.Source}}{{end}}{{end}}' convolab-server 2>/dev/null || true)"
                if [ "$router_config_dir_source" = "$ROUTER_DIR" ]; then
                  docker exec convolab-server nginx -t
                  docker exec convolab-server nginx -s reload
                else
                  echo "♻️ Recreating router to bind the config directory..."
                  $COMPOSE up -d --no-deps --force-recreate router
                  wait_for_container_health convolab-server
                fi
              else
                $COMPOSE up -d --no-deps router
                wait_for_container_health convolab-server
              fi
            }

            rollback_router() {
              previous_color="$1"
              echo "↩️ Rolling router back to $previous_color..."
              render_router_config "$previous_color" "$previous_direct_account_api_enabled"
              if ! reload_router; then
                echo "❌ Router rollback reload failed; production may still be on the failed color."
                return 1
              fi
              if ! verify_public_health; then
                echo "❌ Public health is still failing after rollback to $previous_color."
                return 1
              fi
              write_active_color "$previous_color"
            }

            active_color="blue"
            if [ -s "$ACTIVE_COLOR_FILE" ]; then
              active_color="$(cat "$ACTIVE_COLOR_FILE")"
            fi
            case "$active_color" in
              blue) inactive_color="green" ;;
              green) inactive_color="blue" ;;
              *)
                echo "❌ Invalid active color '$active_color' in $ACTIVE_COLOR_FILE"
                exit 1
                ;;
            esac

            echo "Active color: $active_color"
            echo "Deploying inactive color: $inactive_color"

            echo "🧹 Removing stale inactive web color before memory check if present..."
            if docker inspect "convolab-server-$inactive_color" >/dev/null 2>&1; then
              docker rm -f "convolab-server-$inactive_color" || {
                echo "❌ Failed to remove stale inactive color convolab-server-$inactive_color."
                exit 1
              }
            fi

            echo "🧹 Pruning unused Docker data before memory check and image pull..."
            docker system prune -af

            available_mb="$(awk '/MemAvailable/ {print int($2 / 1024)}' /proc/meminfo)"
            echo "Available memory: ${available_mb}MB"
            # MemAvailable already reflects long-running Postgres, Redis, the active
            # web color, and the old worker during its one retirement deployment.
            # Keep at least 2500MB free for the inactive web color, router work,
            # image extraction, and rollback headroom.
            if [ "$available_mb" -lt 2500 ]; then
              echo "❌ Refusing blue/green deploy with less than 2500MB available memory."
              exit 1
            fi

            echo "🔐 Logging in to GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "🐋 Pulling Docker images (tag: $IMAGE_TAG)..."
            timeout 600 $COMPOSE pull router "server-$inactive_color"

            echo "🧱 Ensuring Postgres and Redis stay running..."
            $COMPOSE up -d postgres redis

            echo "🗄️ Running production migrations before traffic switch..."
            $COMPOSE run --rm -T --no-deps "server-$inactive_color" npx prisma migrate deploy </dev/null

            echo "🚦 Starting convolab-server-$inactive_color..."
            $COMPOSE up -d --no-deps "server-$inactive_color"
            wait_for_container_health "convolab-server-$inactive_color"

            echo "📈 Verifying the Learning OS analytics token before traffic switch..."
            docker exec "convolab-server-$inactive_color" \
              node --input-type=module --eval='
                const port = process.env.PORT || "3001";
                const response = await fetch(`http://127.0.0.1:${port}/api/tools/analytics`, {
                  method: "POST",
                  signal: AbortSignal.timeout(10_000),
                  headers: {
                    Accept: "application/json",
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify({
                    tool: "deployment",
                    event: "preflight",
                    context: "app",
                    properties: { source: "convolab-production" },
                  }),
                });
                if (response.status !== 204) {
                  console.error(`Learning OS analytics preflight returned HTTP ${response.status}.`);
                  process.exit(1);
                }
              '
            echo "✅ Learning OS analytics token preflight passed."

            router_role="$(docker inspect -f '{{index .Config.Labels "convolab.role"}}' convolab-server 2>/dev/null || true)"
            if [ "$router_role" = "router" ]; then
              echo "🔀 Reloading router to $inactive_color..."
              render_router_config "$inactive_color"
              reload_router
            elif docker inspect convolab-server >/dev/null 2>&1; then
              echo "❌ convolab-server exists without the expected router role."
              echo "Refusing to replace an unexpected production container automatically."
              echo "🧹 Removing the inactive app started for this aborted deploy..."
              if ! docker rm -f "convolab-server-$inactive_color"; then
                echo "⚠️ Failed to remove convolab-server-$inactive_color; manual cleanup is required."
              fi
              exit 1
            else
              echo "🔀 Starting router for new production stack..."
              render_router_config "$inactive_color"
              $COMPOSE up -d --no-deps router
              if ! wait_for_container_health convolab-server; then
                echo "❌ Router failed to become healthy on the fresh production stack."
                exit 1
              fi
            fi

            if ! verify_public_health \
              || ! verify_public_google_oauth \
              || ! verify_public_learning_os_browser_route; then
              echo "❌ Public verification failed after switching to $inactive_color."
              if ! rollback_router "$active_color"; then
                echo "❌ Rollback also failed; manual intervention is required."
              fi
              exit 1
            fi

            write_active_color "$inactive_color"

            echo "🛑 Stopping old web color if present..."
            if docker inspect "convolab-server-$active_color" >/dev/null 2>&1; then
              if docker stop "convolab-server-$active_color"; then
                docker rm "convolab-server-$active_color" 2>/dev/null || echo "⚠️ Failed to remove stopped old color convolab-server-$active_color."
              else
                echo "⚠️ Failed to stop old color convolab-server-$active_color; it may still be running."
              fi
            fi

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            $COMPOSE ps
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            echo "🧹 Cleaning up dangling images..."
            docker image prune -f

            echo "✅ Production blue/green deployment complete!"
          ENDSSH
          } | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$DROPLET_USER@$DROPLET_HOST" bash -s

      - name: Health check
        run: |
          echo "🏥 Running health check..."

          for i in {1..20}; do
            if curl -f -s https://convo-lab.com/health > /dev/null; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i/20 failed, retrying in 5s..."
            sleep 5
          done

          echo "❌ Health check failed after 20 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
