version: '3.8'

networks:
  convolab-network:
    driver: bridge
  health-network:
    external: true
    name: health-tracker_health-network

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/convolab-data/postgres
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/convolab-data/redis
  learning-os-storage:
    driver: local

x-server-environment: &server-environment
  NODE_ENV: production
  PORT: 3001
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  GOOGLE_APPLICATION_CREDENTIALS: /app/gcloud-key.json
  GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
  GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
  CLIENT_URL: ${CLIENT_URL}
  JWT_SECRET: ${JWT_SECRET}
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  LLM_PROVIDER: ${LLM_PROVIDER:-openai}
  STUDY_CARD_GENERATOR_MODEL: ${STUDY_CARD_GENERATOR_MODEL:-gpt-5.5}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_REGION: ${AWS_REGION}
  MONTHLY_GENERATION_LIMIT: ${MONTHLY_GENERATION_LIMIT:-30}
  FISH_AUDIO_API_KEY: ${FISH_AUDIO_API_KEY}
  LEARNING_OS_API_URL: ${LEARNING_OS_API_URL:-http://learning-os:8080}
  LEARNING_OS_API_TOKEN: ${LEARNING_OS_API_TOKEN:-}
  LEARNING_OS_PROXY_USER_EMAIL: ${LEARNING_OS_PROXY_USER_EMAIL:-}

x-server-service: &server-service
  image: ghcr.io/andyroo2000/convolab-server:${CONVOLAB_IMAGE_TAG:-latest}
  restart: unless-stopped
  environment: *server-environment
  volumes:
    - ./server/gcloud-key.json:/app/gcloud-key.json:ro
  networks:
    - convolab-network
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  mem_limit: 1024m
  mem_reservation: 512m
  healthcheck:
    test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

x-learning-os-environment: &learning-os-environment
  APP_ENV: production
  APP_DEBUG: "false"
  APP_KEY: ${LEARNING_OS_APP_KEY}
  APP_URL: http://learning-os:8080
  LOG_CHANNEL: stderr
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${LEARNING_OS_DB:-learning_os}
  DB_USERNAME: ${POSTGRES_USER}
  DB_PASSWORD: ${POSTGRES_PASSWORD}
  PGSQL_SSL_MODE: disable
  CACHE_STORE: database
  QUEUE_CONNECTION: database
  DB_QUEUE_RETRY_AFTER: 3660
  SESSION_DRIVER: database
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  STUDY_CARD_GENERATOR_MODEL: ${STUDY_CARD_GENERATOR_MODEL:-gpt-5.5}
  STUDY_CARD_GENERATOR_REASONING_EFFORT: ${STUDY_CARD_GENERATOR_REASONING_EFFORT:-medium}
  STUDY_CARD_IMAGE_GENERATOR_MODEL: ${STUDY_CARD_IMAGE_GENERATOR_MODEL:-gpt-image-1}
  FISH_AUDIO_API_KEY: ${FISH_AUDIO_API_KEY}
  FISH_AUDIO_API_BASE_URL: ${FISH_AUDIO_API_BASE_URL:-https://api.fish.audio}
  FISH_AUDIO_BACKEND: ${FISH_AUDIO_BACKEND:-s1}

x-learning-os-service: &learning-os-service
  image: ghcr.io/andyroo2000/learning-os:${LEARNING_OS_IMAGE_TAG:-latest}
  restart: unless-stopped
  environment: *learning-os-environment
  volumes:
    - learning-os-storage:/app/storage/app
  networks:
    - convolab-network
  depends_on:
    postgres:
      condition: service_healthy
  mem_limit: 768m
  mem_reservation: 256m
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

services:
  postgres:
    image: postgres:15-alpine
    container_name: convolab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: languageflow
      POSTGRES_USER: languageflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - convolab-network
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U languageflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: convolab-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - convolab-network
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  learning-os:
    <<: *learning-os-service
    container_name: learning-os-api
    networks:
      convolab-network:
        aliases:
          - learning-os
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "$$context = stream_context_create(['http' => ['timeout' => 2]]); exit(@file_get_contents('http://127.0.0.1:8080/up', false, $$context) === false ? 1 : 0);",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  learning-os-worker:
    <<: *learning-os-service
    container_name: learning-os-worker
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "database",
        "--queue=study-imports,study-card-drafts,default",
        "--sleep=3",
        "--tries=4",
        "--timeout=3600",
        "--max-time=3600",
      ]
    stop_grace_period: 65m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'artisan queue:work'",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  router:
    image: nginx:1.27-alpine
    container_name: convolab-server
    restart: unless-stopped
    labels:
      convolab.role: router
    ports:
      - "3001:3001"
    volumes:
      - ${CONVOLAB_ROUTER_DIR:-/opt/convolab-runtime/prod-router}:/etc/nginx/conf.d:ro
    networks:
      - convolab-network
      - health-network
    mem_limit: 128m
    mem_reservation: 32m
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3001/nginx-health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  server-blue:
    <<: *server-service
    container_name: convolab-server-blue

  server-green:
    <<: *server-service
    container_name: convolab-server-green

  worker:
    image: ghcr.io/andyroo2000/convolab-worker:${CONVOLAB_IMAGE_TAG:-latest}
    container_name: convolab-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcloud-key.json
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      STUDY_CARD_GENERATOR_MODEL: ${STUDY_CARD_GENERATOR_MODEL:-gpt-5.5}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      FISH_AUDIO_API_KEY: ${FISH_AUDIO_API_KEY}
    volumes:
      - ./server/gcloud-key.json:/app/gcloud-key.json:ro
    networks:
      - convolab-network
      - health-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 1536m
    mem_reservation: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
