version: '3.8'

networks:
  convolab-network:
    driver: bridge
  health-network:
    external: true
    name: health-tracker_health-network

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/convolab-data/postgres
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/convolab-data/redis

x-server-environment: &server-environment
  NODE_ENV: production
  PORT: 3001
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  GOOGLE_APPLICATION_CREDENTIALS: /app/gcloud-key.json
  GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
  GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
  CLIENT_URL: ${CLIENT_URL}
  JWT_SECRET: ${JWT_SECRET}
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  LLM_PROVIDER: ${LLM_PROVIDER:-openai}
  STUDY_CARD_GENERATOR_MODEL: ${STUDY_CARD_GENERATOR_MODEL:-gpt-5.5}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_REGION: ${AWS_REGION}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
  FISH_AUDIO_API_KEY: ${FISH_AUDIO_API_KEY}

x-server-service: &server-service
  image: ghcr.io/andyroo2000/convolab-server:${CONVOLAB_IMAGE_TAG:-latest}
  restart: unless-stopped
  environment: *server-environment
  volumes:
    - ./server/gcloud-key.json:/app/gcloud-key.json:ro
  networks:
    - convolab-network
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  mem_limit: 1024m
  mem_reservation: 512m
  healthcheck:
    test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

services:
  postgres:
    image: postgres:15-alpine
    container_name: convolab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: languageflow
      POSTGRES_USER: languageflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - convolab-network
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U languageflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: convolab-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - convolab-network
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  router:
    image: nginx:1.27-alpine
    container_name: convolab-server
    restart: unless-stopped
    labels:
      convolab.role: router
    ports:
      - "3001:3001"
    volumes:
      - ${CONVOLAB_ROUTER_CONFIG:-/opt/convolab-runtime/prod-router/default.conf}:/etc/nginx/conf.d/default.conf:ro
    networks:
      - convolab-network
      - health-network
    mem_limit: 128m
    mem_reservation: 32m
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  server-blue:
    <<: *server-service
    container_name: convolab-server-blue

  server-green:
    <<: *server-service
    container_name: convolab-server-green

  worker:
    image: ghcr.io/andyroo2000/convolab-worker:${CONVOLAB_IMAGE_TAG:-latest}
    container_name: convolab-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcloud-key.json
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      STUDY_CARD_GENERATOR_MODEL: ${STUDY_CARD_GENERATOR_MODEL:-gpt-5.5}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      FISH_AUDIO_API_KEY: ${FISH_AUDIO_API_KEY}
    volumes:
      - ./server/gcloud-key.json:/app/gcloud-key.json:ro
    networks:
      - convolab-network
      - health-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 1536m
    mem_reservation: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
